<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>工作台 · ShadowBlade</title>
    <link rel="icon" type="image/svg+xml" href="/showcase/brand/favicon.svg" />
    <meta property="og:title" content="工作台 · ShadowBlade" />
    <meta property="og:description" content="新建视频、追踪渲染、跳回最近项目 — 你的指挥中心。" />
    <meta property="og:image" content="/showcase/screens/screen-studio.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/showcase/screens/screen-studio.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/app.css" />
    <style>
      /* === Workbench layout =================================================== */
      .wb-hero {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
        gap: var(--sb-space-5);
        align-items: stretch;
      }
      @media (max-width: 1080px) {
        .wb-hero { grid-template-columns: 1fr; }
      }
      .wb-hero__primary {
        border-radius: var(--sb-radius-lg);
        background:
          radial-gradient(120% 100% at 90% -20%, rgba(34,211,183,0.25), transparent 55%),
          linear-gradient(160deg, #112646 0%, #050a18 75%);
        border: 1px solid var(--sb-border-strong);
        padding: var(--sb-space-6);
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: var(--sb-space-4);
        min-height: 280px;
      }
      .wb-hero__eyebrow {
        font-family: var(--sb-font-mono);
        font-size: 11px;
        letter-spacing: 0.18em;
        color: var(--sb-accent-300);
        text-transform: uppercase;
      }
      .wb-hero__title {
        font-family: var(--sb-font-display);
        font-size: 32px;
        font-weight: 700;
        line-height: 1.15;
        margin: 0;
      }
      .wb-hero__lead {
        color: var(--sb-text-muted);
        font-size: var(--sb-text-md);
        max-width: 52ch;
        margin: 0;
      }
      .wb-hero__cta {
        display: flex;
        flex-wrap: wrap;
        gap: var(--sb-space-3);
      }
      .wb-hero__cta .sb-btn { min-width: 156px; justify-content: center; }
      .wb-hero__brandcard {
        border-radius: var(--sb-radius-lg);
        background: var(--sb-surface);
        border: 1px solid var(--sb-border);
        padding: var(--sb-space-5);
        display: grid;
        gap: var(--sb-space-3);
        align-content: start;
      }
      .wb-hero__brandcard h3 {
        font-size: var(--sb-text-sm);
        font-weight: 600;
        color: var(--sb-text-muted);
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .wb-brand-swatch {
        display: grid;
        grid-template-columns: 44px 44px 44px 1fr;
        gap: var(--sb-space-2);
        align-items: center;
      }
      .wb-brand-swatch i {
        width: 44px;
        height: 44px;
        border-radius: var(--sb-radius);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      }
      .wb-brand-name {
        font-family: var(--sb-font-display);
        font-weight: 600;
        font-size: var(--sb-text-md);
      }
      .wb-brand-meta {
        font-size: var(--sb-text-xs);
        color: var(--sb-text-faint);
        font-family: var(--sb-font-mono);
      }
      .wb-brand-fallback {
        color: var(--sb-text-muted);
        font-size: var(--sb-text-sm);
      }

      /* === KPI grid ============================================================= */
      .wb-kpis {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: var(--sb-space-4);
      }
      @media (max-width: 980px) { .wb-kpis { grid-template-columns: repeat(2, 1fr); } }
      .wb-kpi {
        background: var(--sb-surface);
        border: 1px solid var(--sb-border);
        border-radius: var(--sb-radius-lg);
        padding: var(--sb-space-4) var(--sb-space-5);
        display: grid;
        gap: 6px;
      }
      .wb-kpi__label {
        font-size: var(--sb-text-xs);
        color: var(--sb-text-faint);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
      }
      .wb-kpi__value {
        font-family: var(--sb-font-display);
        font-size: 36px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }
      .wb-kpi__unit {
        font-size: var(--sb-text-xs);
        color: var(--sb-text-faint);
        font-family: var(--sb-font-mono);
      }

      /* === Two-column grid for tasks + actions ================================= */
      .wb-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.45fr) minmax(0, 1fr);
        gap: var(--sb-space-5);
        align-items: start;
      }
      @media (max-width: 1080px) { .wb-grid { grid-template-columns: 1fr; } }

      /* === Active task list ==================================================== */
      .wb-task {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: var(--sb-space-3);
        padding: var(--sb-space-3) var(--sb-space-4);
        border-radius: var(--sb-radius);
        border: 1px solid var(--sb-border);
        background: rgba(11,18,32,0.55);
      }
      .wb-task--running { border-color: rgba(34,211,183,0.4); }
      .wb-task__source {
        font-family: var(--sb-font-mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--sb-text-faint);
        padding: 4px 8px;
        border-radius: var(--sb-radius-sm);
        background: rgba(255,255,255,0.04);
      }
      .wb-task__name {
        font-weight: 600;
        font-size: var(--sb-text-md);
      }
      .wb-task__meta {
        font-size: var(--sb-text-xs);
        color: var(--sb-text-muted);
        font-family: var(--sb-font-mono);
      }
      .wb-task__bar {
        margin-top: 8px;
        height: 4px;
        border-radius: 99px;
        background: rgba(255,255,255,0.06);
        overflow: hidden;
        position: relative;
      }
      .wb-task__bar i {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, var(--sb-accent-500), var(--sb-status-running));
        border-radius: 99px;
        transform-origin: left;
      }
      .wb-task__pct {
        font-family: var(--sb-font-mono);
        font-size: var(--sb-text-sm);
        font-variant-numeric: tabular-nums;
        color: var(--sb-text);
      }
      .wb-empty {
        padding: var(--sb-space-5);
        border: 1px dashed var(--sb-border-strong);
        border-radius: var(--sb-radius);
        text-align: center;
        color: var(--sb-text-muted);
        font-size: var(--sb-text-sm);
      }
      .wb-empty b { color: var(--sb-text); font-weight: 600; }

      /* === Quick actions ======================================================= */
      .wb-actions {
        display: grid;
        gap: var(--sb-space-3);
      }
      .wb-action {
        display: grid;
        grid-template-columns: 36px 1fr auto;
        align-items: center;
        gap: var(--sb-space-3);
        padding: var(--sb-space-3) var(--sb-space-4);
        border-radius: var(--sb-radius);
        border: 1px solid var(--sb-border);
        background: rgba(255,255,255,0.02);
        color: var(--sb-text);
        text-decoration: none;
        transition: transform var(--sb-dur), border-color var(--sb-dur);
      }
      .wb-action:hover {
        transform: translateY(-1px);
        border-color: var(--sb-accent-500);
      }
      .wb-action__icon {
        width: 36px; height: 36px;
        display: grid; place-items: center;
        border-radius: var(--sb-radius);
        background: rgba(34,211,183,0.12);
        color: var(--sb-accent-300);
      }
      .wb-action__title { font-weight: 600; font-size: var(--sb-text-md); }
      .wb-action__desc {
        color: var(--sb-text-muted);
        font-size: var(--sb-text-xs);
      }
      .wb-action__endpoint {
        font-family: var(--sb-font-mono);
        font-size: 10px;
        color: var(--sb-text-faint);
      }

      /* === Templates strip ===================================================== */
      .wb-tpl-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--sb-space-3);
      }
      @media (max-width: 880px) { .wb-tpl-grid { grid-template-columns: repeat(2, 1fr); } }
      .wb-tpl {
        display: grid;
        gap: 6px;
        padding: var(--sb-space-3) var(--sb-space-4);
        border-radius: var(--sb-radius);
        border: 1px solid var(--sb-border);
        background: rgba(11,18,32,0.4);
        text-decoration: none;
        color: var(--sb-text);
        transition: transform var(--sb-dur), border-color var(--sb-dur);
      }
      .wb-tpl:hover { transform: translateY(-2px); border-color: var(--sb-accent-500); }
      .wb-tpl__name { font-weight: 600; font-size: var(--sb-text-md); }
      .wb-tpl__desc {
        color: var(--sb-text-muted);
        font-size: var(--sb-text-xs);
        line-height: 1.45;
      }
      .wb-tpl__tags {
        display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px;
      }
      .wb-tpl__tags span {
        padding: 2px 8px;
        font-size: 10px;
        font-family: var(--sb-font-mono);
        color: var(--sb-accent-300);
        background: rgba(34,211,183,0.08);
        border-radius: 99px;
      }
      .wb-tpl__badge {
        font-size: 10px;
        color: var(--sb-text-faint);
        font-family: var(--sb-font-mono);
        margin-left: 6px;
      }

      /* === Recent projects ===================================================== */
      .wb-proj-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: var(--sb-space-4);
      }
      .wb-proj {
        padding: var(--sb-space-4);
        border-radius: var(--sb-radius-lg);
        background: var(--sb-surface);
        border: 1px solid var(--sb-border);
        display: grid;
        gap: var(--sb-space-2);
        text-decoration: none;
        color: var(--sb-text);
        transition: transform var(--sb-dur), border-color var(--sb-dur);
      }
      .wb-proj:hover { transform: translateY(-2px); border-color: var(--sb-accent-500); }
      .wb-proj__head {
        display: flex; align-items: center; justify-content: space-between; gap: var(--sb-space-2);
      }
      .wb-proj__name {
        font-weight: 600;
        font-size: var(--sb-text-md);
        line-height: 1.3;
      }
      .wb-proj__brief {
        color: var(--sb-text-muted);
        font-size: var(--sb-text-sm);
        line-height: 1.5;
      }
      .wb-proj__meta {
        display: flex; gap: var(--sb-space-3);
        font-size: var(--sb-text-xs);
        color: var(--sb-text-faint);
        font-family: var(--sb-font-mono);
      }
      .wb-proj__status {
        font-size: 10px;
        font-family: var(--sb-font-mono);
        padding: 2px 8px;
        border-radius: 99px;
        background: rgba(255,255,255,0.04);
        color: var(--sb-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .wb-proj__status--rendering { background: rgba(34,211,183,0.12); color: var(--sb-accent-300); }
      .wb-proj__status--done { background: rgba(34,211,183,0.18); color: var(--sb-accent-300); }
      .wb-proj__status--review { background: rgba(255,179,71,0.16); color: #FFC078; }
      .wb-proj__status--draft, .wb-proj__status--scripting { background: rgba(255,255,255,0.06); color: var(--sb-text-muted); }

      /* === Section utilities =================================================== */
      .wb-section {
        display: grid;
        gap: var(--sb-space-4);
      }
      .wb-section__head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: var(--sb-space-3);
      }
      .wb-section__head h2 {
        margin: 0;
        font-size: var(--sb-text-lg);
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .wb-section__head a {
        font-size: var(--sb-text-xs);
        color: var(--sb-text-muted);
        text-decoration: none;
        font-family: var(--sb-font-mono);
      }
      .wb-section__head a:hover { color: var(--sb-accent-300); }
      .wb-skeleton {
        height: 16px;
        border-radius: 4px;
        background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.10), rgba(255,255,255,0.04));
        background-size: 200% 100%;
        animation: wb-skel 1.4s ease-in-out infinite;
      }
      @keyframes wb-skel {
        from { background-position: 200% 0; }
        to   { background-position: -200% 0; }
      }
      .wb-live-dot {
        display: inline-block;
        width: 8px; height: 8px;
        background: var(--sb-accent-500);
        border-radius: 99px;
        margin-right: 6px;
        box-shadow: 0 0 0 0 rgba(34,211,183,0.6);
        animation: wb-pulse 2s infinite;
      }
      @keyframes wb-pulse {
        0%   { box-shadow: 0 0 0 0 rgba(34,211,183,0.5); }
        70%  { box-shadow: 0 0 0 10px rgba(34,211,183,0); }
        100% { box-shadow: 0 0 0 0 rgba(34,211,183,0); }
      }
    </style>
  </head>
  <body data-route="studio">
    <div class="sb-shell">
      <div data-shell="sidebar"></div>

      <div class="sb-shell__main">
        <header class="sb-topbar">
          <div class="sb-breadcrumb">
            <span>Acme</span>
            <svg class="sb-breadcrumb-sep" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
            <span>制作</span>
            <svg class="sb-breadcrumb-sep" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
            <b>工作台</b>
          </div>
          <span class="sb-pill sb-pill--running" id="wb-live-pill" style="margin-left:var(--sb-space-3);display:none">
            <span class="wb-live-dot"></span><span id="wb-live-count">0</span> 进行中
          </span>
          <div class="sb-topbar__actions">
            <a class="sb-btn sb-btn--ghost" href="/projects.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7h18M3 12h18M3 17h18"/></svg>
              全部项目
            </a>
            <a class="sb-btn sb-btn--ghost" href="/templates.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              浏览模板
            </a>
            <a class="sb-btn sb-btn--primary" href="/new-video.html" id="wb-cta-new">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
              新建视频
            </a>
          </div>
        </header>

        <main class="sb-content sb-stack" style="gap:var(--sb-space-6)">

          <!-- ============ Hero + Brand Card ============ -->
          <section class="wb-hero">
            <div class="wb-hero__primary">
              <span class="wb-hero__eyebrow">WORKBENCH · STUDIO</span>
              <h1 class="wb-hero__title">今天我们来做点什么？</h1>
              <p class="wb-hero__lead" id="wb-lead">
                选模板、写一行简报、按下「生成」—— ShadowBlade 会替你拼好镜头、配乐和字幕。
              </p>
              <div class="wb-hero__cta">
                <a class="sb-btn sb-btn--primary" href="/new-video.html">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                  新建视频
                </a>
                <a class="sb-btn sb-btn--ghost" href="/new-video.html?mode=preview">
                  <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
                  快速预览
                </a>
                <a class="sb-btn sb-btn--ghost" href="/assets.html">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3v12M5 10l7 7 7-7M5 21h14"/></svg>
                  上传素材
                </a>
              </div>
            </div>

            <aside class="wb-hero__brandcard" aria-labelledby="wb-brandkit-title">
              <h3 id="wb-brandkit-title">当前品牌套件</h3>
              <div id="wb-brand-body">
                <div class="wb-skeleton" style="width:60%"></div>
                <div class="wb-skeleton" style="width:80%; margin-top:8px"></div>
                <div class="wb-skeleton" style="width:40%; margin-top:8px"></div>
              </div>
              <div style="margin-top:auto;display:flex;justify-content:space-between;align-items:center">
                <a class="sb-btn sb-btn--ghost sb-btn--sm" href="/brand-kit-compare.html">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
                  切换 / 比较
                </a>
                <span class="wb-brand-meta" id="wb-brand-scope-pill">—</span>
              </div>
            </aside>
          </section>

          <!-- ============ KPIs ============ -->
          <section class="wb-kpis" id="wb-kpis" aria-label="关键指标">
            <article class="wb-kpi"><span class="wb-kpi__label">今日已渲染</span><span class="wb-kpi__value">—</span><span class="wb-kpi__unit">videos</span></article>
            <article class="wb-kpi"><span class="wb-kpi__label">本周已渲染</span><span class="wb-kpi__value">—</span><span class="wb-kpi__unit">videos</span></article>
            <article class="wb-kpi"><span class="wb-kpi__label">进行中任务</span><span class="wb-kpi__value">—</span><span class="wb-kpi__unit">tasks</span></article>
            <article class="wb-kpi"><span class="wb-kpi__label">项目总数</span><span class="wb-kpi__value">—</span><span class="wb-kpi__unit">projects</span></article>
          </section>

          <!-- ============ Tasks + Actions side-by-side ============ -->
          <section class="wb-grid">
            <article class="sb-card">
              <header class="sb-card__head">
                <div class="sb-card__title">进行中任务</div>
                <div class="sb-card__head-actions">
                  <span class="sb-pill" id="wb-task-pill" style="display:none">
                    <span class="wb-live-dot"></span>实时
                  </span>
                  <a class="sb-btn sb-btn--ghost sb-btn--sm" href="/render-queue.html">
                    渲染队列
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
                  </a>
                </div>
              </header>
              <div class="sb-card__body sb-stack" id="wb-tasks">
                <div class="wb-empty"><b>暂无进行中任务。</b><br/>按下「新建视频」开始第一个渲染。</div>
              </div>
            </article>

            <article class="sb-card">
              <header class="sb-card__head">
                <div class="sb-card__title">快捷操作</div>
              </header>
              <div class="sb-card__body wb-actions" id="wb-actions">
                <div class="wb-skeleton" style="height:60px"></div>
                <div class="wb-skeleton" style="height:60px"></div>
                <div class="wb-skeleton" style="height:60px"></div>
                <div class="wb-skeleton" style="height:60px"></div>
              </div>
            </article>
          </section>

          <!-- ============ Featured templates ============ -->
          <section class="wb-section" aria-label="常用模板">
            <div class="wb-section__head">
              <h2>常用模板</h2>
              <a href="/templates.html">查看全部 →</a>
            </div>
            <div class="wb-tpl-grid" id="wb-templates">
              <div class="wb-skeleton" style="height:96px"></div>
              <div class="wb-skeleton" style="height:96px"></div>
              <div class="wb-skeleton" style="height:96px"></div>
            </div>
          </section>

          <!-- ============ Recent projects ============ -->
          <section class="wb-section" aria-label="最近项目">
            <div class="wb-section__head">
              <h2>最近项目</h2>
              <a href="/projects.html">查看全部 →</a>
            </div>
            <div class="wb-proj-grid" id="wb-projects">
              <div class="wb-skeleton" style="height:140px"></div>
              <div class="wb-skeleton" style="height:140px"></div>
              <div class="wb-skeleton" style="height:140px"></div>
            </div>
          </section>

        </main>

        <footer class="sb-footer">
          <span id="wb-footer-status">就绪 · 工作台数据自动刷新中</span>
          <span id="wb-footer-meta">—</span>
        </footer>
      </div>
    </div>

    <script src="scripts/shell.js"></script>
    <script src="scripts/workbench.js"></script>
  </body>
</html>
