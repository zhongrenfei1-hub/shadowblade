<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 · ShadowBlade</title>
    <link rel="icon" type="image/svg+xml" href="/showcase/brand/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/app.css" />
    <style>
      body { display: grid; place-items: center; min-height: 100vh; padding: var(--sb-space-8); }
      .sb-404 {
        text-align: center;
        max-width: 580px;
        display: grid;
        gap: var(--sb-space-5);
        justify-items: center;
      }
      .sb-404 .glyph {
        position: relative;
        width: 200px; height: 200px;
      }
      .sb-404 .glyph svg { width: 100%; height: 100%; }
      .sb-404 h1 {
        margin: 0;
        font-family: var(--sb-font-display);
        font-size: clamp(36px, 4vw, 52px);
        font-weight: 600;
        letter-spacing: -0.025em;
      }
      .sb-404 p { color: var(--sb-text-muted); font-size: var(--sb-text-lg); margin: 0; }
      .sb-404 code {
        font-family: var(--sb-font-mono);
        font-size: var(--sb-text-sm);
        background: rgba(255,255,255,0.04);
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid var(--sb-border);
        color: var(--sb-accent-300);
      }
      .sb-404 .actions { display: flex; gap: var(--sb-space-3); flex-wrap: wrap; justify-content: center; }
      .sb-404 .helpful {
        margin-top: var(--sb-space-6);
        display: flex; flex-wrap: wrap; gap: var(--sb-space-2); justify-content: center;
        font-size: var(--sb-text-sm);
      }
      .sb-404 .helpful a {
        padding: 6px 10px;
        border-radius: var(--sb-radius-pill);
        border: 1px solid var(--sb-border);
        color: var(--sb-text-muted);
      }
      .sb-404 .helpful a:hover { color: var(--sb-text); border-color: rgba(34,211,183,0.4); }
    </style>
  </head>
  <body>
    <div class="sb-404">
      <div class="glyph">
        <svg viewBox="0 0 200 200">
          <defs>
            <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#22D3B7"/>
              <stop offset="100%" stop-color="#38BDF8"/>
            </linearGradient>
          </defs>
          <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(34,211,183,0.25)" stroke-width="1" stroke-dasharray="3 6"/>
          <circle cx="100" cy="100" r="56" fill="rgba(34,211,183,0.08)"/>
          <text x="100" y="115" font-family="Inter Display" font-size="58" font-weight="700" text-anchor="middle" fill="url(#g4)">404</text>
        </svg>
      </div>

      <div class="sb-eyebrow">片段丢失</div>
      <h1>这个页面没有渲染出来。</h1>
      <p>你点击的链接可能已失效，或项目已归档。试试下面这些入口，或回到工作台。</p>
      <code>GET /<span id="path">unknown-path</span> → 404</code>

      <div class="actions">
        <a class="sb-btn sb-btn--primary" href="dashboard.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
          返回工作台
        </a>
        <a class="sb-btn sb-btn--ghost" href="index.html">官网首页</a>
        <a class="sb-btn sb-btn--ghost" href="docs.html">浏览文档</a>
      </div>

      <div class="helpful">
        <a href="dashboard.html">工作台</a>
        <a href="projects.html">项目</a>
        <a href="studio.html">编辑器</a>
        <a href="render-queue.html">渲染队列</a>
        <a href="brand-kit.html">品牌套件</a>
        <a href="analytics.html">数据分析</a>
        <a href="templates.html">模板</a>
        <a href="status.html">服务状态</a>
      </div>
    </div>

    <script>
      document.getElementById('path').textContent = location.pathname.replace(/^\//, '') || 'unknown-path';
    </script>
  </body>
</html>
