<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>集成 · ShadowBlade</title>
    <link rel="icon" type="image/svg+xml" href="/showcase/brand/favicon.svg" />
    <meta property="og:title" content="集成 · ShadowBlade" />
    <meta property="og:description" content="把 ShadowBlade 接进你的技术栈——Slack、Asana、Figma、Drive、GitHub 等。" />
    <meta property="og:image" content="/showcase/brand/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/showcase/brand/og-image.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/app.css" />
    <style>
      .sb-int-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: var(--sb-space-4);
      }
      .sb-int {
        padding: var(--sb-space-5);
        border-radius: var(--sb-radius-lg);
        border: 1px solid var(--sb-border);
        background: rgba(11,18,32,0.6);
        display: grid;
        gap: var(--sb-space-3);
        transition: transform var(--sb-dur) var(--sb-ease-out), border-color var(--sb-dur);
      }
      .sb-int:hover { transform: translateY(-2px); border-color: rgba(34,211,183,0.4); }
      .sb-int__head { display: flex; align-items: center; gap: var(--sb-space-3); }
      .sb-int__icon {
        width: 44px; height: 44px; border-radius: 10px;
        display: grid; place-items: center;
        background: rgba(255,255,255,0.04);
      }
      .sb-int__name {
        font-family: var(--sb-font-display);
        font-size: var(--sb-text-md);
        font-weight: 600;
      }
      .sb-int__cat {
        font-size: var(--sb-text-xs);
        color: var(--sb-text-faint);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 2px;
      }
      .sb-int__desc {
        color: var(--sb-text-muted);
        font-size: var(--sb-text-sm);
      }
      .sb-int__foot {
        display: flex; justify-content: space-between; align-items: center;
        margin-top: var(--sb-space-2);
      }
      .sb-int__state {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: var(--sb-text-xs);
        color: var(--sb-text-faint);
      }
      .sb-int__state b {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--sb-graphite-400);
      }
      .sb-int--connected .sb-int__state b { background: var(--sb-accent-500); box-shadow: 0 0 0 3px rgba(34,211,183,0.16); }
      .sb-int--connected .sb-int__state { color: var(--sb-accent-300); }

      .sb-int-filters {
        display: flex; flex-wrap: wrap; gap: 6px;
        padding: var(--sb-space-4) var(--sb-space-6);
        border-bottom: 1px solid var(--sb-border);
      }

      @media (max-width: 1100px) { .sb-int-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 720px)  { .sb-int-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body data-route="settings">
    <div class="sb-shell">
      <div data-shell="sidebar"></div>

      <div class="sb-shell__main">
        <header class="sb-topbar">
          <div class="sb-breadcrumb">
            <span>Acme</span>
            <svg class="sb-breadcrumb-sep" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
            <span>工作空间</span>
            <svg class="sb-breadcrumb-sep" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
            <b>集成</b>
          </div>
          <label class="sb-topbar__search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
            <input type="search" aria-label="搜索集成" placeholder="搜索 38 个集成…" />
            <kbd>⌘K</kbd>
          </label>
          <div class="sb-topbar__actions">
            <a class="sb-btn sb-btn--ghost" href="#">自建一个</a>
            <a class="sb-btn sb-btn--primary" href="settings.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
              API 与 Webhook
            </a>
          </div>
        </header>

        <main class="sb-content">
          <section class="sb-page-head">
            <div class="sb-page-head__row">
              <div>
                <div class="sb-eyebrow">工作空间 · 集成</div>
                <h1>把 ShadowBlade 接进你的技术栈。</h1>
                <p class="sb-page-head__lead">
                  38 个开箱即用集成，覆盖 CMS、社交、协作、存储、数据、身份。全部通过 OAuth 或 API 密钥鉴权——未授权前不会接触你的渲染数据。
                </p>
              </div>
            </div>
          </section>

          <article class="sb-card">
            <div class="sb-int-filters">
              <span class="sb-chip sb-chip--active" style="display:inline-flex;align-items:center;gap:6px;font-size:var(--sb-text-sm);padding:6px 10px;border-radius:99px;color:var(--sb-text);background:rgba(34,211,183,0.14);border:1px solid rgba(34,211,183,0.4)">全部 <small style="color:var(--sb-text-faint);margin-left:4px">38</small></span>
              <span class="sb-chip" style="display:inline-flex;align-items:center;gap:6px;font-size:var(--sb-text-sm);padding:6px 10px;border-radius:99px;color:var(--sb-text-muted);border:1px solid var(--sb-border)">已连接 <small style="color:var(--sb-text-faint);margin-left:4px">6</small></span>
              <span class="sb-chip" style="display:inline-flex;align-items:center;gap:6px;font-size:var(--sb-text-sm);padding:6px 10px;border-radius:99px;color:var(--sb-text-muted);border:1px solid var(--sb-border)">CMS</span>
              <span class="sb-chip" style="display:inline-flex;align-items:center;gap:6px;font-size:var(--sb-text-sm);padding:6px 10px;border-radius:99px;color:var(--sb-text-muted);border:1px solid var(--sb-border)">社交</span>
              <span class="sb-chip" style="display:inline-flex;align-items:center;gap:6px;font-size:var(--sb-text-sm);padding:6px 10px;border-radius:99px;color:var(--sb-text-muted);border:1px solid var(--sb-border)">协作</span>
              <span class="sb-chip" style="display:inline-flex;align-items:center;gap:6px;font-size:var(--sb-text-sm);padding:6px 10px;border-radius:99px;color:var(--sb-text-muted);border:1px solid var(--sb-border)">存储</span>
              <span class="sb-chip" style="display:inline-flex;align-items:center;gap:6px;font-size:var(--sb-text-sm);padding:6px 10px;border-radius:99px;color:var(--sb-text-muted);border:1px solid var(--sb-border)">数据</span>
              <span class="sb-chip" style="display:inline-flex;align-items:center;gap:6px;font-size:var(--sb-text-sm);padding:6px 10px;border-radius:99px;color:var(--sb-text-muted);border:1px solid var(--sb-border)">身份</span>
            </div>

            <div class="sb-card__body">
              <div class="sb-int-grid" id="grid"></div>
            </div>
          </article>
        </main>

        <footer class="sb-footer">
          <span>集成市场 · v2 · 38 个合作伙伴</span>
          <span>Webhook 投递 &lt; 1 秒 · 签名载荷</span>
        </footer>
      </div>
    </div>

    <template id="int-tpl">
      <article class="sb-int">
        <div class="sb-int__head">
          <div class="sb-int__icon"></div>
          <div>
            <div class="sb-int__name"></div>
            <div class="sb-int__cat"></div>
          </div>
          <button class="sb-btn sb-btn--ghost sb-btn--sm" style="margin-left:auto">连接</button>
        </div>
        <div class="sb-int__desc"></div>
        <div class="sb-int__foot">
          <span class="sb-int__state"><b></b><span>未连接</span></span>
          <a href="#" style="font-size:var(--sb-text-xs);color:var(--sb-text-faint)">文档</a>
        </div>
      </article>
    </template>

    <script src="scripts/shell.js"></script>
    <script>
      const ICON = (color, mark) => `<svg width="24" height="24" viewBox="0 0 24 24" fill="none">${mark.replace(/COLOR/g, color)}</svg>`;
      const INTS = [
        { name: 'Slack', cat: '协作', desc: '把 render.completed、review.requested 事件投递到任意频道。表情符号即可批准成片。', icon: ICON('#4A154B','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">S</text>'), connected: true },
        { name: 'Notion', cat: 'CMS · 文档', desc: '从 Notion 数据库同步简报；成片完成后发布回同一页面。', icon: ICON('#0f0f0f','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR" stroke="#666"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">N</text>'), connected: true },
        { name: 'Figma', cat: '品牌 · 设计', desc: '直接从 Figma 变量拉取生效的品牌套件。每晚或发布时同步。', icon: ICON('#F24E1E','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">F</text>'), connected: true },
        { name: 'YouTube', cat: '社交 · 发布', desc: '把成片作为定时帖发布。从时间线继承章节和字幕。', icon: ICON('#FF0000','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><polygon points="10,8 16,12 10,16" fill="#fff"/>'), connected: true },
        { name: 'LinkedIn', cat: '社交 · B2B', desc: '把竖屏成片发布到 Pages 与 Showcase。自动标签遵循品牌套件。', icon: ICON('#0A66C2','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">in</text>'), connected: true },
        { name: 'TikTok Business', cat: '社交 · 付费', desc: '把 9:16 成片作为付费创意推送；把转化数据回流到数据分析。', icon: ICON('#000','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#22D3B7" text-anchor="middle">d</text>'), connected: true },
        { name: 'Adobe Premiere', cat: '编辑', desc: '把时间线导出为 Premiere 工程，手工调校最后 10%。', icon: ICON('#9999FF','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#000" text-anchor="middle">Pr</text>') },
        { name: 'After Effects', cat: '编辑 · 动效', desc: '把 After Effects 合成作为场景空镜素材插入。通过 Aerender 无头渲染。', icon: ICON('#5555FF','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Ae</text>') },
        { name: 'Drive', cat: '存储', desc: '把完成的成片镜像到共享 Drive 文件夹，便于分发。', icon: ICON('#0F9D58','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><polygon points="6,18 12,8 18,18" fill="#fff"/>') },
        { name: 'SharePoint', cat: '存储 · 企业', desc: '把完成的成片与原始素材发布到 SharePoint 文档库。', icon: ICON('#036C70','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">S</text>') },
        { name: 'Salesforce', cat: 'CRM · GTM', desc: '商机进入第 4 阶段时，触发一条个性化成片。', icon: ICON('#00A1E0','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">SF</text>') },
        { name: 'HubSpot', cat: 'CRM · 营销', desc: '在外发邮件中嵌入视频 CTA，并追踪点击。', icon: ICON('#FF7A59','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">H</text>') },
        { name: 'Looker', cat: '数据', desc: '把数据分析推送到你仓库原生的仪表盘。', icon: ICON('#4285F4','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><circle cx="12" cy="12" r="5" fill="#fff"/>') },
        { name: 'Snowflake', cat: '数据仓库', desc: '把渲染流水线的每个事件流式写入 Snowflake，便于治理。', icon: ICON('#29B5E8','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">SF</text>') },
        { name: 'PagerDuty', cat: '运维', desc: '渲染队列深度突破 SLA 阈值时，呼叫值班团队。', icon: ICON('#06AC38','<rect x="3" y="3" width="18" height="18" rx="3" fill="COLOR"/><text x="12" y="16" font-family="Inter" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">PD</text>') },
      ];
      const tpl = document.getElementById('int-tpl');
      const grid = document.getElementById('grid');
      INTS.forEach((i) => {
        const node = tpl.content.firstElementChild.cloneNode(true);
        node.querySelector('.sb-int__icon').innerHTML = i.icon;
        node.querySelector('.sb-int__name').textContent = i.name;
        node.querySelector('.sb-int__cat').textContent = i.cat;
        node.querySelector('.sb-int__desc').textContent = i.desc;
        if (i.connected) {
          node.classList.add('sb-int--connected');
          node.querySelector('.sb-int__state span').textContent = '已连接';
          node.querySelector('.sb-btn').textContent = '配置';
        }
        grid.appendChild(node);
      });
    </script>
  </body>
</html>
