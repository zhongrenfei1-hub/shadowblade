<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="ShadowBlade · 4 分钟出片">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="55%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="og-glow-right" cx="0.82" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.24"/>
      <stop offset="60%" stop-color="#22D3B7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-glow-left" cx="0.16" cy="0.12" r="0.4">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="og-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="og-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2842"/>
      <stop offset="100%" stop-color="#0B1326"/>
    </linearGradient>
    <linearGradient id="og-meter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-glow-right)"/>
  <rect width="1200" height="630" fill="url(#og-glow-left)"/>

  <!-- 网格 -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <path d="M0 105H1200M0 210H1200M0 315H1200M0 420H1200M0 525H1200"/>
    <path d="M150 0V630M300 0V630M450 0V630M600 0V630M750 0V630M900 0V630M1050 0V630"/>
  </g>

  <!-- 品牌锁定区 -->
  <g transform="translate(70 70)">
    <rect width="44" height="44" rx="12" fill="#0F1D3A" stroke="rgba(34,211,183,0.45)"/>
    <g transform="translate(10 10) scale(1.05)">
      <path d="M2 2L24 12L2 22V14L14 12L2 10V2Z" fill="url(#og-mark)"/>
    </g>
    <text x="62" y="22" font-family="Inter Display, Inter, PingFang SC, system-ui, sans-serif" font-weight="700" font-size="20" fill="#F7F9FC">ShadowBlade</text>
    <text x="62" y="40" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="11" letter-spacing="2.4" fill="#8590A8" font-weight="600">企业级 AI 视频云</text>
  </g>

  <!-- 顶部 chip -->
  <g transform="translate(70 178)">
    <rect width="252" height="34" rx="17" fill="rgba(34,211,183,0.10)" stroke="rgba(34,211,183,0.35)"/>
    <circle cx="20" cy="17" r="4.5" fill="#22D3B7"/>
    <text x="36" y="22" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="12" letter-spacing="2.4" font-weight="700" fill="#22D3B7">企业级 AI 视频云</text>
  </g>

  <!-- 主标题：ShadowBlade · 4 分钟出片 -->
  <g transform="translate(70 250)" font-family="Inter Display, Inter, PingFang SC, system-ui, sans-serif" fill="#F7F9FC">
    <text font-size="58" font-weight="700" letter-spacing="-1.4">
      <tspan x="0" y="0">ShadowBlade</tspan>
    </text>
    <text font-size="64" font-weight="700" letter-spacing="-1.6">
      <tspan x="0" y="86">4 </tspan>
      <tspan font-weight="800" fill="url(#og-text)">分钟出片</tspan><tspan>。</tspan>
    </text>
  </g>

  <!-- 副标 -->
  <text x="70" y="450" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="18" fill="#B6BDCC">市场、培训、产品团队共用的企业级视频流水线。</text>

  <!-- 右侧：流水线圆环 -->
  <g transform="translate(960 315)">
    <circle r="180" fill="none" stroke="url(#og-mark)" stroke-width="1.4" stroke-dasharray="3 7" opacity="0.55"/>
    <circle r="130" fill="none" stroke="rgba(34,211,183,0.32)" stroke-width="1"/>
    <circle r="80" fill="none" stroke="rgba(34,211,183,0.22)" stroke-width="1"/>

    <!-- 环上四个阶段节点 -->
    <g fill="#22D3B7">
      <circle cx="0" cy="-180" r="5"/>
      <circle cx="171" cy="-55" r="5"/>
      <circle cx="106" cy="146" r="5"/>
      <circle cx="-171" cy="-55" r="5"/>
    </g>

    <!-- 中心播放盘 -->
    <circle r="56" fill="url(#og-card)" stroke="rgba(34,211,183,0.55)" stroke-width="1.4"/>
    <circle r="56" fill="none" stroke="rgba(34,211,183,0.30)" stroke-width="12" stroke-dasharray="130 360" stroke-dashoffset="-78"/>
    <path d="M-14 -20L24 0L-14 20Z" fill="#22D3B7"/>
  </g>

  <!-- 渲染 ETA chip -->
  <g transform="translate(820 270)">
    <rect width="170" height="56" rx="12" fill="rgba(8,14,28,0.92)" stroke="rgba(34,211,183,0.6)"/>
    <circle cx="22" cy="28" r="5" fill="#22D3B7"/>
    <circle cx="22" cy="28" r="9" fill="none" stroke="#22D3B7" stroke-opacity="0.35" stroke-width="1.4"/>
    <text x="40" y="24" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="10" fill="#8590A8" font-weight="600" letter-spacing="2">渲染中</text>
    <text x="40" y="44" font-family="Inter Display, Inter, PingFang SC, system-ui, sans-serif" font-size="18" fill="#F7F9FC" font-weight="700">预计 64 秒</text>
  </g>

  <!-- 合成进度小卡 -->
  <g transform="translate(820 400)">
    <rect width="200" height="68" rx="12" fill="rgba(8,14,28,0.92)" stroke="rgba(255,255,255,0.10)"/>
    <text x="16" y="22" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="10" fill="#8590A8" font-weight="600" letter-spacing="2.2">合成</text>
    <text x="16" y="40" font-family="Inter Display, Inter, PingFang SC, system-ui, sans-serif" font-size="16" font-weight="700" fill="#F7F9FC">已完成 62%</text>
    <rect x="16" y="50" width="168" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="16" y="50" width="104" height="6" rx="3" fill="url(#og-meter)"/>
  </g>

  <!-- 底部信任条 -->
  <g transform="translate(70 552)" font-family="Inter, PingFang SC, system-ui, sans-serif">
    <text font-size="11" letter-spacing="3" font-weight="600" fill="#5A667F">SOC 2 · SSO · 区域化渲染 · 企业级</text>
    <text x="0" y="36" font-size="14" font-weight="600" fill="#22D3B7">shadowblade.video</text>
  </g>

  <!-- 右下版权 -->
  <g transform="translate(1130 600)" font-family="Inter, PingFang SC, system-ui, sans-serif" fill="#5A667F" font-size="11" letter-spacing="2" text-anchor="end">
    <text>© 2026 SHADOWBLADE LABS</text>
  </g>
</svg>
