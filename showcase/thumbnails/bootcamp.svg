<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 608" width="1080" height="608" role="img" aria-label="Onboarding · Sales engineering bootcamp">
  <defs>
    <linearGradient id="bc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162844"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="bc-glow" cx="0.5" cy="0" r="0.7">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="608" fill="url(#bc-bg)"/>
  <rect width="1080" height="608" fill="url(#bc-glow)"/>

  <!-- Course modules -->
  <g transform="translate(64 240)">
    <g>
      <rect width="280" height="240" rx="18" fill="rgba(34,211,183,0.16)" stroke="rgba(34,211,183,0.42)"/>
      <text x="22" y="32" font-family="Inter, sans-serif" font-size="11" fill="#22D3B7" font-weight="700" letter-spacing="2.4">模块 01</text>
      <text x="22" y="80" font-family="Inter Display, Inter, sans-serif" font-size="28" font-weight="700" fill="#F7F9FC">需求挖掘</text>
      <text x="22" y="106" font-family="Inter, sans-serif" font-size="13" fill="#B6BDCC">28 分钟 · 4 场景</text>
      <rect x="22" y="200" width="100" height="6" rx="3" fill="rgba(255,255,255,0.10)"/>
      <rect x="22" y="200" width="100" height="6" rx="3" fill="#22D3B7"/>
    </g>
    <g transform="translate(300 0)">
      <rect width="280" height="240" rx="18" fill="rgba(56,189,248,0.16)" stroke="rgba(56,189,248,0.42)"/>
      <text x="22" y="32" font-family="Inter, sans-serif" font-size="11" fill="#38BDF8" font-weight="700" letter-spacing="2.4">模块 02</text>
      <text x="22" y="80" font-family="Inter Display, Inter, sans-serif" font-size="28" font-weight="700" fill="#F7F9FC">演示功力</text>
      <text x="22" y="106" font-family="Inter, sans-serif" font-size="13" fill="#B6BDCC">36 分钟 · 6 场景</text>
      <rect x="22" y="200" width="180" height="6" rx="3" fill="rgba(255,255,255,0.10)"/>
      <rect x="22" y="200" width="120" height="6" rx="3" fill="#38BDF8"/>
    </g>
    <g transform="translate(600 0)">
      <rect width="280" height="240" rx="18" fill="rgba(167,139,250,0.16)" stroke="rgba(167,139,250,0.42)"/>
      <text x="22" y="32" font-family="Inter, sans-serif" font-size="11" fill="#A78BFA" font-weight="700" letter-spacing="2.4">模块 03</text>
      <text x="22" y="80" font-family="Inter Display, Inter, sans-serif" font-size="28" font-weight="700" fill="#F7F9FC">商务谈判</text>
      <text x="22" y="106" font-family="Inter, sans-serif" font-size="13" fill="#B6BDCC">32 分钟 · 5 场景</text>
      <rect x="22" y="200" width="180" height="6" rx="3" fill="rgba(255,255,255,0.10)"/>
      <rect x="22" y="200" width="60" height="6" rx="3" fill="#A78BFA"/>
    </g>
  </g>

  <!-- Eyebrow + title -->
  <g transform="translate(64 60)">
    <rect width="186" height="30" rx="15" fill="rgba(167,139,250,0.14)" stroke="rgba(167,139,250,0.45)"/>
    <circle cx="18" cy="15" r="4" fill="#A78BFA"/>
    <text x="32" y="20" font-family="Inter, sans-serif" font-size="11" fill="#A78BFA" font-weight="600" letter-spacing="2.4">内部 · 学习发展</text>
  </g>
  <g transform="translate(64 130)" fill="#F7F9FC" font-family="Inter Display, Inter, sans-serif">
    <text font-size="58" font-weight="700" letter-spacing="-1.6">售前训练营</text>
    <text x="0" y="48" font-size="20" font-weight="500" fill="#8590A8">3 个模块 · 96 秒成片待审核</text>
  </g>

  <!-- Status pill (top right) -->
  <g transform="translate(870 60)">
    <rect width="142" height="30" rx="15" fill="rgba(167,139,250,0.18)" stroke="rgba(167,139,250,0.45)"/>
    <circle cx="16" cy="15" r="4" fill="#A78BFA"/>
    <text x="28" y="20" font-family="Inter, sans-serif" font-size="11" fill="#A78BFA" font-weight="700" letter-spacing="2.4">审核中</text>
  </g>

  <!-- Owner badge bottom -->
  <g transform="translate(64 540)" font-family="Inter, sans-serif">
    <text font-size="11" fill="#8590A8" letter-spacing="2.4" font-weight="600">培训 · 16:9 · MARCUS LEE</text>
  </g>
</svg>
