<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 608" width="1080" height="608" role="img" aria-label="Q3 customer story — Helios Logistics">
  <defs>
    <linearGradient id="hl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B2F4C"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="hl-sun" cx="0.78" cy="0.18" r="0.4">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="608" fill="url(#hl-bg)"/>
  <rect width="1080" height="608" fill="url(#hl-sun)"/>

  <!-- Sun/orbit motif -->
  <g transform="translate(860 130)">
    <circle r="78" fill="rgba(56,189,248,0.22)"/>
    <circle r="44" fill="rgba(56,189,248,0.5)"/>
    <circle r="20" fill="#38BDF8"/>
    <circle r="120" fill="none" stroke="rgba(56,189,248,0.32)" stroke-width="1" stroke-dasharray="3 6"/>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(64 60)">
    <rect width="184" height="30" rx="15" fill="rgba(56,189,248,0.14)" stroke="rgba(56,189,248,0.45)"/>
    <circle cx="18" cy="15" r="4" fill="#38BDF8"/>
    <text x="32" y="20" font-family="Inter, sans-serif" font-size="11" fill="#38BDF8" font-weight="600" letter-spacing="2.4">Q3 CUSTOMER STORY</text>
  </g>

  <!-- Title -->
  <g transform="translate(64 150)" fill="#F7F9FC" font-family="Inter Display, Inter, sans-serif">
    <text font-size="68" font-weight="700" letter-spacing="-1.9">Helios Logistics</text>
    <text x="0" y="56" font-size="26" font-weight="500" fill="#B6BDCC">From 6-week edits to a same-day cut.</text>
  </g>

  <!-- Quote card -->
  <g transform="translate(64 320)">
    <rect width="640" height="142" rx="16" fill="rgba(8,14,28,0.85)" stroke="rgba(56,189,248,0.30)"/>
    <text x="28" y="34" font-family="Inter, sans-serif" font-size="11" fill="#38BDF8" letter-spacing="2.2" font-weight="700">PULL QUOTE</text>
    <text x="28" y="68" font-family="Inter Display, Inter, sans-serif" font-size="22" font-weight="600" fill="#F7F9FC">"We shipped 14 customer-ready cuts</text>
    <text x="28" y="98" font-family="Inter Display, Inter, sans-serif" font-size="22" font-weight="600" fill="#F7F9FC">in the time one used to take."</text>
    <text x="28" y="124" font-family="Inter, sans-serif" font-size="13" fill="#8590A8">— Naomi Soto, VP Brand · Helios Logistics</text>
  </g>

  <!-- KPI badges -->
  <g transform="translate(720 320)" font-family="Inter Display, Inter, sans-serif">
    <g>
      <rect width="280" height="66" rx="12" fill="rgba(34,211,183,0.10)" stroke="rgba(34,211,183,0.35)"/>
      <text x="18" y="28" font-family="Inter, sans-serif" font-size="11" letter-spacing="2.2" font-weight="600" fill="#22D3B7">TIME-TO-CUT</text>
      <text x="18" y="54" font-size="22" font-weight="700" fill="#F7F9FC">42× faster</text>
    </g>
    <g transform="translate(0 76)">
      <rect width="280" height="66" rx="12" fill="rgba(56,189,248,0.10)" stroke="rgba(56,189,248,0.35)"/>
      <text x="18" y="28" font-family="Inter, sans-serif" font-size="11" letter-spacing="2.2" font-weight="600" fill="#38BDF8">APPROVAL</text>
      <text x="18" y="54" font-size="22" font-weight="700" fill="#F7F9FC">96% in round one</text>
    </g>
  </g>

  <!-- Draft pill (top right) -->
  <g transform="translate(890 60)">
    <rect width="120" height="30" rx="15" fill="rgba(148,163,184,0.16)" stroke="rgba(148,163,184,0.40)"/>
    <circle cx="16" cy="15" r="4" fill="#94A3B8"/>
    <text x="28" y="20" font-family="Inter, sans-serif" font-size="11" fill="#94A3B8" font-weight="700" letter-spacing="2.4">DRAFT</text>
  </g>

  <!-- Metadata bottom -->
  <g transform="translate(64 540)" font-family="Inter, sans-serif">
    <text font-size="11" fill="#8590A8" letter-spacing="2.4" font-weight="600">CASE STUDY · 16:9 · 75s · AVA CHEN</text>
  </g>
</svg>
