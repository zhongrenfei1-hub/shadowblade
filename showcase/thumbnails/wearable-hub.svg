<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 608" width="1080" height="608" role="img" aria-label="Spring product launch — wearable hub">
  <defs>
    <linearGradient id="wh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F3A72"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="wh-glow" cx="0.78" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wh-ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="608" fill="url(#wh-bg)"/>
  <rect width="1080" height="608" fill="url(#wh-glow)"/>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.04)">
    <path d="M0 152H1080M0 304H1080M0 456H1080"/>
    <path d="M180 0V608M360 0V608M540 0V608M720 0V608M900 0V608"/>
  </g>

  <!-- Wearable hub circles right -->
  <g transform="translate(770 304)">
    <circle r="200" fill="rgba(34,211,183,0.10)"/>
    <circle r="140" fill="rgba(34,211,183,0.20)"/>
    <circle r="86" fill="rgba(34,211,183,0.34)"/>
    <circle r="50" fill="#22D3B7"/>
    <circle r="200" fill="none" stroke="url(#wh-ring)" stroke-width="1.4" stroke-dasharray="3 6"/>
    <text y="6" text-anchor="middle" font-family="Inter Display, Inter, sans-serif" font-weight="700" font-size="28" fill="#0A1428">HUB</text>
  </g>

  <!-- Eyebrow chip -->
  <g transform="translate(64 60)">
    <rect width="170" height="30" rx="15" fill="rgba(34,211,183,0.12)" stroke="rgba(34,211,183,0.45)"/>
    <circle cx="18" cy="15" r="4" fill="#22D3B7"/>
    <text x="32" y="20" font-family="Inter, sans-serif" font-size="11" fill="#22D3B7" font-weight="600" letter-spacing="2.4">春季发布</text>
  </g>

  <!-- Title -->
  <g transform="translate(64 158)" fill="#F7F9FC" font-family="Inter Display, Inter, sans-serif">
    <text font-size="64" font-weight="700" letter-spacing="-1.8">
      <tspan x="0" y="0">Wearable Hub</tspan>
      <tspan x="0" y="76" font-weight="500" fill="#B6BDCC">主视觉预告 · 28 秒</tspan>
    </text>
  </g>

  <!-- Metadata strip -->
  <g transform="translate(64 484)" font-family="Inter, sans-serif">
    <text font-size="11" fill="#8590A8" letter-spacing="2.4" font-weight="600">付费社媒 · 9:16 · AVA CHEN</text>
  </g>

  <!-- Bottom dock: meter -->
  <g transform="translate(64 538)">
    <rect width="600" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect width="372" height="6" rx="3" fill="url(#wh-ring)"/>
    <text x="616" y="10" font-family="Inter, sans-serif" font-size="12" fill="#22D3B7" font-weight="600">62%</text>
  </g>

  <!-- Status pill (top right) -->
  <g transform="translate(870 60)">
    <rect width="142" height="30" rx="15" fill="rgba(56,189,248,0.16)" stroke="rgba(56,189,248,0.45)"/>
    <circle cx="16" cy="15" r="4" fill="#38BDF8"/>
    <text x="28" y="20" font-family="Inter, sans-serif" font-size="11" fill="#38BDF8" font-weight="700" letter-spacing="2">渲染中</text>
  </g>
</svg>
