<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 608" width="1080" height="608" role="img" aria-label="AI Copilot — 60s product demo">
  <defs>
    <linearGradient id="cp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#093D54"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="cp-glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cp-ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="608" fill="url(#cp-bg)"/>
  <rect width="1080" height="608" fill="url(#cp-glow)"/>

  <!-- Concentric rings center -->
  <g transform="translate(780 304)">
    <circle r="240" fill="none" stroke="rgba(34,211,183,0.18)" stroke-width="1.2" stroke-dasharray="4 8"/>
    <circle r="170" fill="none" stroke="url(#cp-ring)" stroke-width="1.5"/>
    <circle r="110" fill="none" stroke="rgba(34,211,183,0.45)" stroke-width="1.2"/>
    <circle r="60" fill="#0A1428" stroke="#22D3B7" stroke-width="1.5"/>
    <circle r="22" fill="#22D3B7"/>
    <!-- orbit nodes -->
    <circle cx="170" cy="0" r="6" fill="#38BDF8"/>
    <circle cx="-120" cy="-120" r="6" fill="#22D3B7"/>
    <circle cx="-160" cy="80" r="6" fill="#A78BFA"/>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(64 60)">
    <rect width="148" height="30" rx="15" fill="rgba(34,211,183,0.12)" stroke="rgba(34,211,183,0.45)"/>
    <circle cx="18" cy="15" r="4" fill="#22D3B7"/>
    <text x="32" y="20" font-family="Inter, sans-serif" font-size="11" fill="#22D3B7" font-weight="600" letter-spacing="2.4">PRODUCT DEMO</text>
  </g>

  <!-- Title -->
  <g transform="translate(64 158)" fill="#F7F9FC" font-family="Inter Display, Inter, sans-serif">
    <text font-size="64" font-weight="700" letter-spacing="-1.8">AI Copilot</text>
    <text x="0" y="64" font-size="34" font-weight="500" fill="#B6BDCC">60-second walkthrough</text>
  </g>

  <!-- Caption box -->
  <g transform="translate(64 304)">
    <rect width="380" height="92" rx="14" fill="rgba(8,14,28,0.85)" stroke="rgba(255,255,255,0.10)"/>
    <text x="22" y="30" font-family="Inter, sans-serif" font-size="11" fill="#8590A8" letter-spacing="2.2" font-weight="600">CAPTION · SCENE 03</text>
    <text x="22" y="56" font-family="Inter Display, Inter, sans-serif" font-size="17" fill="#F7F9FC" font-weight="600">"Ship a workflow,</text>
    <text x="22" y="78" font-family="Inter Display, Inter, sans-serif" font-size="17" fill="#F7F9FC" font-weight="600">not a checklist."</text>
  </g>

  <!-- Status pill (top right) -->
  <g transform="translate(870 60)">
    <rect width="142" height="30" rx="15" fill="rgba(167,139,250,0.18)" stroke="rgba(167,139,250,0.45)"/>
    <circle cx="16" cy="15" r="4" fill="#A78BFA"/>
    <text x="28" y="20" font-family="Inter, sans-serif" font-size="11" fill="#A78BFA" font-weight="700" letter-spacing="2.4">SCRIPTING</text>
  </g>

  <!-- Metadata bottom -->
  <g transform="translate(64 540)" font-family="Inter, sans-serif">
    <text font-size="11" fill="#8590A8" letter-spacing="2.4" font-weight="600">SALES · 16:9 · PRIYA RAO</text>
  </g>
</svg>
