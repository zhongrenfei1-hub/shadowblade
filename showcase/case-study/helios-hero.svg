<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Helios Logistics customer story hero — 68% faster, $184k saved per quarter">
  <defs>
    <linearGradient id="sb-helios-hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="55%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="sb-helios-hero-sun" cx="0.82" cy="0.22" r="0.55">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sb-helios-hero-warm" cx="0.85" cy="0.20" r="0.18">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sb-helios-hero-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#22D3B7"/>
    </linearGradient>
    <linearGradient id="sb-helios-hero-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2842"/>
      <stop offset="100%" stop-color="#0B1326"/>
    </linearGradient>
    <linearGradient id="sb-helios-hero-meter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sb-helios-hero-bg)"/>
  <rect width="1600" height="900" fill="url(#sb-helios-hero-sun)"/>
  <rect width="1600" height="900" fill="url(#sb-helios-hero-warm)"/>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.035)" stroke-width="1">
    <path d="M0 150H1600M0 300H1600M0 450H1600M0 600H1600M0 750H1600"/>
    <path d="M150 0V900M300 0V900M450 0V900M600 0V900M750 0V900M900 0V900M1050 0V900M1200 0V900M1350 0V900M1500 0V900"/>
  </g>

  <!-- Sun motif (top right, large) -->
  <g transform="translate(1280 240)">
    <circle r="220" fill="none" stroke="rgba(56,189,248,0.18)" stroke-width="1" stroke-dasharray="3 7"/>
    <circle r="160" fill="none" stroke="rgba(56,189,248,0.24)" stroke-width="1"/>
    <circle r="110" fill="rgba(56,189,248,0.10)"/>
    <circle r="70" fill="rgba(56,189,248,0.28)"/>
    <circle r="36" fill="#38BDF8"/>
    <!-- Sun rays -->
    <g stroke="rgba(56,189,248,0.4)" stroke-width="1.6" stroke-linecap="round">
      <line x1="0" y1="-190" x2="0" y2="-210"/>
      <line x1="134" y1="-134" x2="148" y2="-148"/>
      <line x1="190" y1="0" x2="210" y2="0"/>
      <line x1="134" y1="134" x2="148" y2="148"/>
      <line x1="0" y1="190" x2="0" y2="210"/>
      <line x1="-134" y1="134" x2="-148" y2="148"/>
      <line x1="-190" y1="0" x2="-210" y2="0"/>
      <line x1="-134" y1="-134" x2="-148" y2="-148"/>
    </g>
  </g>

  <!-- Eyebrow chip -->
  <g transform="translate(96 96)">
    <rect width="240" height="32" rx="16" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.45)"/>
    <circle cx="18" cy="16" r="4" fill="#38BDF8"/>
    <text x="32" y="21" font-family="Inter, sans-serif" font-size="11" fill="#38BDF8" font-weight="700" letter-spacing="2.4">CUSTOMER STORY · HELIOS</text>
  </g>

  <!-- Logo lockup -->
  <g transform="translate(96 156)">
    <text font-family="Inter, sans-serif" font-size="11" fill="#8590A8" font-weight="600" letter-spacing="3">HELIOS LOGISTICS · BRAND + MARKETING</text>
  </g>

  <!-- Headline -->
  <g transform="translate(96 220)" font-family="Inter Display, Inter, sans-serif" fill="#F7F9FC">
    <text font-size="74" font-weight="600" letter-spacing="-2.0">
      <tspan x="0" y="0">From a 6-week edit </tspan>
      <tspan x="0" y="84">cycle to a </tspan>
      <tspan font-weight="700" fill="url(#sb-helios-hero-text)">same-week cut</tspan><tspan>.</tspan>
    </text>
    <text x="0" y="200" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#B6BDCC" letter-spacing="-0.2">
      <tspan x="0" dy="0">How a 14-region logistics brand cut review rounds, shipped 128 more cuts</tspan>
      <tspan x="0" dy="30">per month, and put $184k back on the marketing line each quarter.</tspan>
    </text>
  </g>

  <!-- KPI badges -->
  <g transform="translate(96 620)" font-family="Inter Display, Inter, sans-serif">
    <g>
      <rect width="280" height="92" rx="14" fill="rgba(34,211,183,0.10)" stroke="rgba(34,211,183,0.40)"/>
      <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" letter-spacing="2.4" font-weight="700" fill="#22D3B7">TIME-TO-FIRST-CUT</text>
      <text x="20" y="68" font-size="34" font-weight="700" fill="#F7F9FC">68% faster</text>
    </g>
    <g transform="translate(304 0)">
      <rect width="280" height="92" rx="14" fill="rgba(56,189,248,0.10)" stroke="rgba(56,189,248,0.40)"/>
      <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" letter-spacing="2.4" font-weight="700" fill="#38BDF8">QUARTERLY SAVINGS</text>
      <text x="20" y="68" font-size="34" font-weight="700" fill="#F7F9FC">$184k saved</text>
    </g>
  </g>

  <!-- CTA row -->
  <g transform="translate(96 752)" font-family="Inter, sans-serif">
    <g>
      <rect width="220" height="50" rx="8" fill="url(#sb-helios-hero-text)"/>
      <text x="110" y="32" font-size="15" font-weight="700" fill="#0A1428" text-anchor="middle">Read the full story →</text>
    </g>
    <g transform="translate(240 0)">
      <rect width="200" height="50" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.18)"/>
      <text x="100" y="32" font-size="15" font-weight="600" fill="#F7F9FC" text-anchor="middle">Watch the 90s cut</text>
    </g>
  </g>

  <!-- Right rail: stat dashboard mini -->
  <g transform="translate(1080 560)">
    <rect width="440" height="240" rx="16" fill="url(#sb-helios-hero-card)" stroke="rgba(255,255,255,0.10)"/>
    <text x="24" y="34" font-family="Inter, sans-serif" font-size="10" fill="#8590A8" font-weight="700" letter-spacing="2.4">Q1 BASELINE → Q3 WITH SHADOWBLADE</text>

    <!-- Row 1 -->
    <g transform="translate(24 60)">
      <text font-family="Inter, sans-serif" font-size="12" fill="#B6BDCC">First-cut latency</text>
      <text x="392" font-family="Inter Display, Inter, sans-serif" font-size="13" font-weight="700" fill="#22D3B7" text-anchor="end">4.8 min</text>
      <rect y="16" width="392" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
      <rect y="16" width="312" height="6" rx="3" fill="url(#sb-helios-hero-meter)"/>
    </g>
    <!-- Row 2 -->
    <g transform="translate(24 110)">
      <text font-family="Inter, sans-serif" font-size="12" fill="#B6BDCC">Cuts shipped / mo</text>
      <text x="392" font-family="Inter Display, Inter, sans-serif" font-size="13" font-weight="700" fill="#38BDF8" text-anchor="end">+128</text>
      <rect y="16" width="392" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
      <rect y="16" width="280" height="6" rx="3" fill="#38BDF8"/>
    </g>
    <!-- Row 3 -->
    <g transform="translate(24 160)">
      <text font-family="Inter, sans-serif" font-size="12" fill="#B6BDCC">Reviewer approval</text>
      <text x="392" font-family="Inter Display, Inter, sans-serif" font-size="13" font-weight="700" fill="#A78BFA" text-anchor="end">92%</text>
      <rect y="16" width="392" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
      <rect y="16" width="360" height="6" rx="3" fill="#A78BFA"/>
    </g>
    <text x="24" y="220" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A667F">last sync · 06 May · 14 regions</text>
  </g>

  <!-- Trust chip bottom right -->
  <g transform="translate(1440 836)" font-family="Inter, sans-serif" fill="#5A667F">
    <text font-size="10" letter-spacing="2.2" font-weight="600" text-anchor="end">CASE STUDY · 16:9 · 90S · AVA CHEN</text>
  </g>
</svg>
