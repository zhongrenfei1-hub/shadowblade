<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Helios metrics — 4.8 min average first cut, +128 cuts per month, 92 percent reviewer approval">
  <defs>
    <linearGradient id="sb-helios-metrics-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="60%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="sb-helios-metrics-glow" cx="0.50" cy="0.20" r="0.55">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sb-helios-metrics-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2842"/>
      <stop offset="100%" stop-color="#0B1326"/>
    </linearGradient>
    <linearGradient id="sb-helios-metrics-rule1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sb-helios-metrics-rule2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sb-helios-metrics-rule3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#sb-helios-metrics-bg)"/>
  <rect width="1200" height="400" fill="url(#sb-helios-metrics-glow)"/>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <path d="M0 100H1200M0 200H1200M0 300H1200"/>
    <path d="M300 0V400M600 0V400M900 0V400"/>
  </g>

  <!-- Eyebrow row -->
  <g transform="translate(48 44)">
    <rect width="220" height="28" rx="14" fill="rgba(34,211,183,0.10)" stroke="rgba(34,211,183,0.40)"/>
    <circle cx="16" cy="14" r="4" fill="#22D3B7"/>
    <text x="28" y="19" font-family="Inter, sans-serif" font-size="10" fill="#22D3B7" font-weight="700" letter-spacing="2.4">部署后 90 天</text>
    <text x="232" y="20" font-family="Inter, sans-serif" font-size="11" fill="#8590A8" font-weight="600" letter-spacing="2.2">HELIOS LOGISTICS &#183; Q3 / 14 个区域</text>
  </g>

  <!-- KPI Card 1: 4.8 min -->
  <g transform="translate(48 108)">
    <rect width="352" height="248" rx="16" fill="url(#sb-helios-metrics-card)" stroke="rgba(255,255,255,0.10)"/>
    <rect x="20" y="20" width="56" height="3" rx="1.5" fill="url(#sb-helios-metrics-rule1)"/>
    <text x="20" y="50" font-family="Inter, sans-serif" font-size="11" fill="#8590A8" font-weight="700" letter-spacing="2.4">平均首版成片</text>

    <!-- Big number (Inter Display 600) -->
    <text x="20" y="148" font-family="Inter Display, Inter, sans-serif" font-size="92" font-weight="600" fill="#F7F9FC" letter-spacing="-2.4">4.8</text>
    <text x="170" y="148" font-family="Inter Display, Inter, sans-serif" font-size="32" font-weight="600" fill="#22D3B7" letter-spacing="-0.4">分钟</text>

    <!-- Label (Inter 400) -->
    <text x="20" y="194" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#B6BDCC">从简报到首版可审稿</text>

    <!-- Mini bar / delta -->
    <g transform="translate(20 214)">
      <rect width="312" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
      <rect width="240" height="6" rx="3" fill="#22D3B7" opacity="0.85"/>
      <text x="312" y="-2" font-family="JetBrains Mono, monospace" font-size="10" fill="#22D3B7" text-anchor="end">&#9660; 较 Q1 -68%</text>
    </g>
  </g>

  <!-- KPI Card 2: +128 cuts -->
  <g transform="translate(424 108)">
    <rect width="352" height="248" rx="16" fill="url(#sb-helios-metrics-card)" stroke="rgba(255,255,255,0.10)"/>
    <rect x="20" y="20" width="56" height="3" rx="1.5" fill="url(#sb-helios-metrics-rule2)"/>
    <text x="20" y="50" font-family="Inter, sans-serif" font-size="11" fill="#8590A8" font-weight="700" letter-spacing="2.4">每月较 Q1</text>

    <text x="20" y="148" font-family="Inter Display, Inter, sans-serif" font-size="92" font-weight="600" fill="#F7F9FC" letter-spacing="-2.4">+128</text>
    <text x="216" y="148" font-family="Inter Display, Inter, sans-serif" font-size="32" font-weight="600" fill="#38BDF8" letter-spacing="-0.4">条</text>

    <text x="20" y="194" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#B6BDCC">每月净新增产能</text>

    <!-- Mini sparkline -->
    <g transform="translate(20 208)">
      <polyline points="0,18 30,14 60,16 90,10 120,8 150,4 180,5 210,2 240,0" fill="none" stroke="#38BDF8" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      <text x="312" y="6" font-family="JetBrains Mono, monospace" font-size="10" fill="#38BDF8" text-anchor="end">9 个月趋势</text>
    </g>
  </g>

  <!-- KPI Card 3: 92% -->
  <g transform="translate(800 108)">
    <rect width="352" height="248" rx="16" fill="url(#sb-helios-metrics-card)" stroke="rgba(255,255,255,0.10)"/>
    <rect x="20" y="20" width="56" height="3" rx="1.5" fill="url(#sb-helios-metrics-rule3)"/>
    <text x="20" y="50" font-family="Inter, sans-serif" font-size="11" fill="#8590A8" font-weight="700" letter-spacing="2.4">一次审核通过率</text>

    <text x="20" y="148" font-family="Inter Display, Inter, sans-serif" font-size="92" font-weight="600" fill="#F7F9FC" letter-spacing="-2.4">92</text>
    <text x="148" y="148" font-family="Inter Display, Inter, sans-serif" font-size="56" font-weight="600" fill="#A78BFA" letter-spacing="-1">%</text>

    <text x="20" y="194" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#B6BDCC">第一轮即通过</text>

    <!-- Round ring -->
    <g transform="translate(280 200)">
      <circle r="20" fill="none" stroke="rgba(167,139,250,0.16)" stroke-width="4"/>
      <circle r="20" fill="none" stroke="#A78BFA" stroke-width="4" stroke-linecap="round" stroke-dasharray="115.6 125.7" transform="rotate(-90)"/>
      <text y="4" font-family="Inter, sans-serif" font-size="10" fill="#A78BFA" font-weight="700" text-anchor="middle">R1</text>
    </g>
  </g>
</svg>
