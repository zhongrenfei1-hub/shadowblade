<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Maya Okonkwo pull quote — We ship video like product now. Same week. Same vibe.">
  <defs>
    <linearGradient id="sb-helios-quote-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="60%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="sb-helios-quote-glow" cx="0.18" cy="0.20" r="0.45">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sb-helios-quote-rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#22D3B7"/>
    </linearGradient>
    <linearGradient id="sb-helios-quote-avatar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#22D3B7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#sb-helios-quote-bg)"/>
  <rect width="1200" height="600" fill="url(#sb-helios-quote-glow)"/>

  <!-- Grid wash -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <path d="M0 150H1200M0 300H1200M0 450H1200"/>
    <path d="M200 0V600M400 0V600M600 0V600M800 0V600M1000 0V600"/>
  </g>

  <!-- Oversized quote glyph -->
  <text x="86" y="218" font-family="Inter Display, Inter, sans-serif" font-size="280" font-weight="700" fill="#38BDF8" opacity="0.16">&#8220;</text>

  <!-- Gradient rule -->
  <rect x="84" y="92" width="56" height="3" rx="1.5" fill="url(#sb-helios-quote-rule)"/>

  <!-- Eyebrow -->
  <g transform="translate(84 116)">
    <text font-family="Inter, sans-serif" font-size="11" fill="#38BDF8" font-weight="700" letter-spacing="2.6">客户引述 · HELIOS LOGISTICS</text>
  </g>

  <!-- Quote (Inter Display 600) -->
  <g transform="translate(84 198)" font-family="Inter Display, Inter, sans-serif" font-weight="600" fill="#F7F9FC">
    <text font-size="56" letter-spacing="-1.6">
      <tspan x="0" y="0">「我们现在像做产品一样发片。</tspan>
      <tspan x="0" y="72">同周交付，调性一致。」</tspan>
    </text>
  </g>

  <!-- Attribution row -->
  <g transform="translate(84 446)">
    <!-- Avatar -->
    <circle cx="32" cy="32" r="32" fill="url(#sb-helios-quote-avatar)"/>
    <text x="32" y="40" text-anchor="middle" font-family="Inter Display, Inter, sans-serif" font-size="22" font-weight="700" fill="#0A1428">MO</text>

    <!-- Name + role (Inter 500, small caps) -->
    <g transform="translate(84 18)" font-family="Inter, sans-serif">
      <text font-size="14" font-weight="700" fill="#F7F9FC" letter-spacing="2.4">MAYA OKONKWO</text>
      <text y="22" font-size="12" font-weight="500" fill="#8590A8" letter-spacing="1.8">内容副总裁 &#183; HELIOS LOGISTICS</text>
    </g>
  </g>

  <!-- Right-side mark: sun motif (echo of hero) -->
  <g transform="translate(1010 300)" opacity="0.92">
    <circle r="148" fill="none" stroke="rgba(56,189,248,0.18)" stroke-width="1" stroke-dasharray="3 7"/>
    <circle r="106" fill="none" stroke="rgba(56,189,248,0.22)" stroke-width="1"/>
    <circle r="72" fill="rgba(56,189,248,0.10)"/>
    <circle r="42" fill="rgba(56,189,248,0.32)"/>
    <circle r="20" fill="#38BDF8"/>
    <g stroke="rgba(56,189,248,0.4)" stroke-width="1.4" stroke-linecap="round">
      <line x1="0" y1="-128" x2="0" y2="-144"/>
      <line x1="90" y1="-90" x2="102" y2="-102"/>
      <line x1="128" y1="0" x2="144" y2="0"/>
      <line x1="90" y1="90" x2="102" y2="102"/>
      <line x1="0" y1="128" x2="0" y2="144"/>
      <line x1="-90" y1="90" x2="-102" y2="102"/>
      <line x1="-128" y1="0" x2="-144" y2="0"/>
      <line x1="-90" y1="-90" x2="-102" y2="-102"/>
    </g>
  </g>

  <!-- Footer mark -->
  <g transform="translate(1116 568)" font-family="Inter, sans-serif" fill="#5A667F">
    <text font-size="10" letter-spacing="2.2" font-weight="600" text-anchor="end">SHADOWBLADE &#183; 客户案例</text>
  </g>
</svg>
