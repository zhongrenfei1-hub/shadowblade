<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="Compare — two facing waveforms colliding at the centre, before / after energy">
  <defs>
    <linearGradient id="sb-compare-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="55%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <linearGradient id="sb-compare-before" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#38BDF8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="sb-compare-after" x1="1" y1="0.5" x2="0" y2="0.5">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#22D3B7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#22D3B7"/>
    </linearGradient>
    <radialGradient id="sb-compare-spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F7F9FC" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#22D3B7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#sb-compare-bg)"/>

  <!-- Grid wash -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <path d="M0 100H800M0 200H800M0 300H800"/>
    <path d="M100 0V400M200 0V400M300 0V400M500 0V400M600 0V400M700 0V400"/>
  </g>

  <!-- Centre seam -->
  <line x1="400" y1="40" x2="400" y2="360" stroke="rgba(247,249,252,0.18)" stroke-width="1" stroke-dasharray="3 5"/>

  <!-- Left waveform (BEFORE — running blue, lower amplitude, jittery) -->
  <g fill="none" stroke="url(#sb-compare-before)" stroke-width="2.2" stroke-linecap="round">
    <path d="M30 200 L70 200 L80 180 L100 220 L120 170 L140 230 L160 160 L180 240 L200 150 L220 250 L240 145 L260 255 L280 140 L300 260 L320 138 L340 262 L360 142 L380 252 L400 200"/>
    <path d="M30 200 L70 200 L80 200 L100 200 L120 200 L140 200 L160 200 L180 200 L200 200 L220 200 L240 200 L260 200 L280 200 L300 200 L320 200 L340 200 L360 200 L380 200 L400 200" stroke-width="1" stroke-opacity="0.35"/>
  </g>

  <!-- Right waveform (AFTER — accent cyan-green, larger amplitude, smooth sinusoid) -->
  <g fill="none" stroke="url(#sb-compare-after)" stroke-width="2.6" stroke-linecap="round">
    <path d="M400 200 Q420 130 440 200 T480 200 T520 200 T560 200 T600 200 T640 200 T680 200 T720 200 T760 200 L770 200"/>
    <path d="M400 200 Q420 270 440 200 T480 200 T520 200 T560 200 T600 200 T640 200 T680 200 T720 200 T760 200 L770 200"/>
    <path d="M400 200 L770 200" stroke-width="1" stroke-opacity="0.35"/>
  </g>

  <!-- Collision spark at the centre -->
  <circle cx="400" cy="200" r="60" fill="url(#sb-compare-spark)"/>
  <circle cx="400" cy="200" r="6" fill="#F7F9FC"/>
  <circle cx="400" cy="200" r="14" fill="none" stroke="rgba(34,211,183,0.55)" stroke-width="1.4"/>
  <circle cx="400" cy="200" r="28" fill="none" stroke="rgba(34,211,183,0.25)" stroke-width="1"/>

  <!-- Side labels -->
  <g font-family="Inter, sans-serif" font-weight="700" font-size="11" letter-spacing="2.4">
    <text x="40" y="60" fill="#38BDF8">改前</text>
    <text x="760" y="60" fill="#22D3B7" text-anchor="end">改后</text>
  </g>

  <!-- Energy ticks bottom -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="rgba(247,249,252,0.55)">
    <text x="40"  y="372">v0</text>
    <text x="200" y="372">v1</text>
    <text x="400" y="372" text-anchor="middle" fill="#F7F9FC">差异</text>
    <text x="600" y="372" text-anchor="middle">v2</text>
    <text x="760" y="372" text-anchor="end" fill="#22D3B7">v3</text>
  </g>
</svg>
