<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="ShadowBlade pipeline before/after — 5-step to 6-step evolution">
  <defs>
    <linearGradient id="sb-cmp-pipe-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F2A4A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <linearGradient id="sb-cmp-pipe-before-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(22,30,48,0.5)"/>
      <stop offset="100%" stop-color="rgba(11,18,32,0.85)"/>
    </linearGradient>
    <linearGradient id="sb-cmp-pipe-after-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(34,211,183,0.06)"/>
      <stop offset="100%" stop-color="rgba(11,18,32,0.9)"/>
    </linearGradient>
    <linearGradient id="sb-cmp-pipe-step-before" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(60,72,96,0.6)"/>
      <stop offset="100%" stop-color="rgba(40,52,76,0.4)"/>
    </linearGradient>
    <linearGradient id="sb-cmp-pipe-step-after" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(34,211,183,0.18)"/>
      <stop offset="100%" stop-color="rgba(15,42,74,0.85)"/>
    </linearGradient>
    <linearGradient id="sb-cmp-pipe-new-step" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(56,189,248,0.36)"/>
      <stop offset="100%" stop-color="rgba(15,42,74,0.95)"/>
    </linearGradient>
    <linearGradient id="sb-cmp-pipe-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="#06101F"/>
  <rect width="1600" height="900" fill="url(#sb-cmp-pipe-bg)"/>

  <!-- Top header -->
  <g transform="translate(80 60)" font-family="Inter, system-ui, sans-serif">
    <text font-size="11" letter-spacing="2.6" font-weight="700" fill="#6EE2C5">流水线术语演进 · 五步 → 六步</text>
    <text y="40" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="34" font-weight="700" fill="#F7F9FC" letter-spacing="-0.7">「合成」改名「混剪」，并新增「封面」步</text>
    <text y="68" font-size="13" fill="#B6BDCC">PR <tspan font-family="JetBrains Mono, monospace" fill="#6EE2C5">80b3326</tspan> · 流水线术语对齐 6 步标准</text>
  </g>

  <!-- ── Before panel (left) ── -->
  <g transform="translate(80 160)">
    <rect width="700" height="640" rx="18" fill="url(#sb-cmp-pipe-before-bg)" stroke="rgba(255,255,255,0.06)"/>

    <!-- Before label -->
    <g transform="translate(28 28)">
      <rect width="86" height="28" rx="6" fill="rgba(148,163,184,0.14)" stroke="rgba(148,163,184,0.30)"/>
      <text x="43" y="19" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" letter-spacing="2" font-weight="700" fill="#94A3B8">BEFORE</text>
    </g>
    <text x="124" y="46" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#B6BDCC">改前 · 五步</text>
    <text x="672" y="46" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A667F">refine ring 003</text>

    <!-- Pipeline steps · greyish -->
    <g transform="translate(40 96)" font-family="Inter, system-ui, sans-serif">
      <g>
        <rect width="620" height="80" rx="10" fill="url(#sb-cmp-pipe-step-before)" stroke="rgba(255,255,255,0.06)"/>
        <g transform="translate(20 22)"><rect width="36" height="36" rx="9" fill="rgba(148,163,184,0.18)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#94A3B8">01</text></g>
        <text x="74" y="38" font-size="16" font-weight="700" fill="#B6BDCC">脚本</text>
        <text x="74" y="60" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A667F">script · GPT-style brief → 6 场景</text>
        <text x="594" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#8590A8">8.4 秒</text>
      </g>
      <g transform="translate(0 88)">
        <rect width="620" height="80" rx="10" fill="url(#sb-cmp-pipe-step-before)" stroke="rgba(255,255,255,0.06)"/>
        <g transform="translate(20 22)"><rect width="36" height="36" rx="9" fill="rgba(148,163,184,0.18)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#94A3B8">02</text></g>
        <text x="74" y="38" font-size="16" font-weight="700" fill="#B6BDCC">分镜</text>
        <text x="74" y="60" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A667F">storyboard · 6/6 已渲染</text>
        <text x="594" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#8590A8">12.1 秒</text>
      </g>
      <g transform="translate(0 176)">
        <rect width="620" height="80" rx="10" fill="url(#sb-cmp-pipe-step-before)" stroke="rgba(255,255,255,0.06)"/>
        <g transform="translate(20 22)"><rect width="36" height="36" rx="9" fill="rgba(148,163,184,0.18)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#94A3B8">03</text></g>
        <text x="74" y="38" font-size="16" font-weight="700" fill="#B6BDCC">配音</text>
        <text x="74" y="60" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A667F">voice · alloy-en-female · -14 LUFS</text>
        <text x="594" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#8590A8">18.6 秒</text>
      </g>
      <g transform="translate(0 264)">
        <rect width="620" height="80" rx="10" fill="rgba(248,113,113,0.06)" stroke="rgba(248,113,113,0.32)"/>
        <g transform="translate(20 22)"><rect width="36" height="36" rx="9" fill="rgba(248,113,113,0.18)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#F87171">04</text></g>
        <text x="74" y="38" font-size="16" font-weight="700" fill="#F7F9FC">合成 <tspan font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.2" fill="#F87171">· 即将更名</tspan></text>
        <text x="74" y="60" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A667F">composite · 含口播、空镜、字幕、音乐</text>
        <text x="594" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#8590A8">41.0 秒</text>
      </g>
      <g transform="translate(0 352)">
        <rect width="620" height="80" rx="10" fill="url(#sb-cmp-pipe-step-before)" stroke="rgba(255,255,255,0.06)"/>
        <g transform="translate(20 22)"><rect width="36" height="36" rx="9" fill="rgba(148,163,184,0.18)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#94A3B8">05</text></g>
        <text x="74" y="38" font-size="16" font-weight="700" fill="#B6BDCC">渲染</text>
        <text x="74" y="60" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A667F">render · H.264 high · 60 fps</text>
        <text x="594" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#8590A8">2:41</text>
      </g>

      <!-- Missing slot · cover -->
      <g transform="translate(0 448)">
        <rect width="620" height="80" rx="10" fill="rgba(248,113,113,0.04)" stroke="rgba(248,113,113,0.30)" stroke-dasharray="4 6"/>
        <g transform="translate(20 22)">
          <rect width="36" height="36" rx="9" fill="rgba(248,113,113,0.10)" stroke="rgba(248,113,113,0.32)" stroke-dasharray="2 3"/>
          <text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#F87171">?</text>
        </g>
        <text x="74" y="38" font-size="16" font-weight="700" fill="#F87171">缺：封面</text>
        <text x="74" y="60" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A667F">poster · 由运营手动出 · 不可追溯</text>
        <text x="594" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#F87171">手工 · 12 分</text>
      </g>
    </g>
  </g>

  <!-- ── Center divider ── -->
  <line x1="800" y1="200" x2="800" y2="800" stroke="rgba(247,249,252,0.18)" stroke-width="1" stroke-dasharray="3 5"/>
  <g transform="translate(800 480)">
    <circle r="20" fill="url(#sb-cmp-pipe-accent)"/>
    <path d="M-6 0L0 -6L6 0L0 6Z" fill="#06101F"/>
  </g>

  <!-- ── After panel (right) ── -->
  <g transform="translate(820 160)">
    <rect width="700" height="640" rx="18" fill="url(#sb-cmp-pipe-after-bg)" stroke="rgba(34,211,183,0.30)"/>

    <!-- After label -->
    <g transform="translate(28 28)">
      <rect width="86" height="28" rx="6" fill="url(#sb-cmp-pipe-accent)"/>
      <text x="43" y="19" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" letter-spacing="2" font-weight="700" fill="#0A1428">AFTER</text>
    </g>
    <text x="124" y="46" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#F7F9FC">改后 · 六步</text>
    <text x="672" y="46" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#6EE2C5">commit 80b3326</text>

    <!-- Pipeline steps · accent -->
    <g transform="translate(40 96)" font-family="Inter, system-ui, sans-serif">
      <g>
        <rect width="620" height="64" rx="10" fill="url(#sb-cmp-pipe-step-after)" stroke="rgba(34,211,183,0.30)"/>
        <g transform="translate(20 14)"><rect width="36" height="36" rx="9" fill="rgba(34,211,183,0.18)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#6EE2C5">01</text></g>
        <text x="74" y="32" font-size="15" font-weight="700" fill="#F7F9FC">脚本</text>
        <text x="74" y="50" font-family="JetBrains Mono, monospace" font-size="10" fill="#8590A8">script · 6 场景 · 品牌语态评分 0.94</text>
        <text x="594" y="40" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#6EE2C5">8.4 秒</text>
      </g>
      <g transform="translate(0 72)">
        <rect width="620" height="64" rx="10" fill="url(#sb-cmp-pipe-step-after)" stroke="rgba(34,211,183,0.30)"/>
        <g transform="translate(20 14)"><rect width="36" height="36" rx="9" fill="rgba(34,211,183,0.18)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#6EE2C5">02</text></g>
        <text x="74" y="32" font-size="15" font-weight="700" fill="#F7F9FC">分镜</text>
        <text x="74" y="50" font-family="JetBrains Mono, monospace" font-size="10" fill="#8590A8">storyboard · 6/6 已渲染</text>
        <text x="594" y="40" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#6EE2C5">12.1 秒</text>
      </g>
      <g transform="translate(0 144)">
        <rect width="620" height="64" rx="10" fill="url(#sb-cmp-pipe-step-after)" stroke="rgba(34,211,183,0.30)"/>
        <g transform="translate(20 14)"><rect width="36" height="36" rx="9" fill="rgba(34,211,183,0.18)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#6EE2C5">03</text></g>
        <text x="74" y="32" font-size="15" font-weight="700" fill="#F7F9FC">配音</text>
        <text x="74" y="50" font-family="JetBrains Mono, monospace" font-size="10" fill="#8590A8">voice · alloy-en-female · -14 LUFS</text>
        <text x="594" y="40" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#6EE2C5">18.6 秒</text>
      </g>
      <!-- renamed step · 混剪 -->
      <g transform="translate(0 216)">
        <rect width="620" height="64" rx="10" fill="url(#sb-cmp-pipe-step-after)" stroke="rgba(34,211,183,0.55)" stroke-width="1.6"/>
        <g transform="translate(20 14)"><rect width="36" height="36" rx="9" fill="rgba(34,211,183,0.32)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#06101F">04</text></g>
        <text x="74" y="32" font-size="15" font-weight="700" fill="#F7F9FC">混剪 <tspan font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#6EE2C5">· 原「合成」</tspan></text>
        <text x="74" y="50" font-family="JetBrains Mono, monospace" font-size="10" fill="#8590A8">mix · 含口播、空镜、字幕、音乐</text>
        <text x="594" y="40" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#6EE2C5">41.0 秒</text>
      </g>
      <g transform="translate(0 288)">
        <rect width="620" height="64" rx="10" fill="url(#sb-cmp-pipe-step-after)" stroke="rgba(34,211,183,0.30)"/>
        <g transform="translate(20 14)"><rect width="36" height="36" rx="9" fill="rgba(34,211,183,0.18)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#6EE2C5">05</text></g>
        <text x="74" y="32" font-size="15" font-weight="700" fill="#F7F9FC">渲染</text>
        <text x="74" y="50" font-family="JetBrains Mono, monospace" font-size="10" fill="#8590A8">render · H.264 high · 60 fps</text>
        <text x="594" y="40" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#6EE2C5">2:41</text>
      </g>
      <!-- new step · 封面 -->
      <g transform="translate(0 376)">
        <rect width="620" height="64" rx="10" fill="url(#sb-cmp-pipe-new-step)" stroke="rgba(56,189,248,0.55)" stroke-width="1.6"/>
        <g transform="translate(20 14)"><rect width="36" height="36" rx="9" fill="rgba(56,189,248,0.32)"/><text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#06101F">06</text></g>
        <text x="74" y="32" font-size="15" font-weight="700" fill="#F7F9FC">封面 <tspan font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#38BDF8">· 新增</tspan></text>
        <text x="74" y="50" font-family="JetBrains Mono, monospace" font-size="10" fill="#8590A8">poster · 自动出主图、关键帧、A/B 候选</text>
        <text x="594" y="40" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" fill="#38BDF8">4.2 秒</text>
      </g>

      <!-- Summary card -->
      <g transform="translate(0 460)">
        <rect width="620" height="64" rx="10" fill="rgba(11,18,32,0.7)" stroke="rgba(34,211,183,0.30)"/>
        <g transform="translate(20 14)">
          <rect width="36" height="36" rx="9" fill="rgba(34,211,183,0.18)"/>
          <text x="18" y="24" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#6EE2C5">✓</text>
        </g>
        <text x="74" y="32" font-size="14" font-weight="700" fill="#F7F9FC">命名一致 · 全部 6 步术语统一</text>
        <text x="74" y="50" font-family="JetBrains Mono, monospace" font-size="10" fill="#8590A8">UI / 文档 / 邮件模板 / Webhook 事件名一并更新</text>
      </g>
    </g>
  </g>

  <!-- ── KPI badge (bottom-right corner of After panel) ── -->
  <g transform="translate(1340 760)">
    <rect width="180" height="92" rx="14" fill="rgba(11,18,32,0.95)" stroke="rgba(34,211,183,0.45)"/>
    <text x="90" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="2.2" font-weight="700" fill="#6EE2C5">封面环节</text>
    <text x="90" y="62" text-anchor="middle" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#F7F9FC" letter-spacing="-0.6">TTV ↓ 38%</text>
    <text x="90" y="80" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#8590A8">从简报到上线封面</text>
  </g>

  <!-- footer caption -->
  <g transform="translate(80 850)" font-family="JetBrains Mono, monospace" font-size="11" fill="#5A667F">
    <text>showcase/compare/before-after-pipeline.svg · 1600 × 900</text>
    <text x="1440" text-anchor="end" fill="#6EE2C5">ShadowBlade · 流水线 6 步标准</text>
  </g>
</svg>
