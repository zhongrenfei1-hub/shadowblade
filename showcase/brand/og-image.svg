<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="ShadowBlade · From brief to broadcast-ready video in 4 minutes">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="60%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="og-glow" cx="0.8" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="og-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="og-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2842"/>
      <stop offset="100%" stop-color="#0B1326"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-glow)"/>

  <!-- grid -->
  <g stroke="rgba(255,255,255,0.04)">
    <path d="M0 105H1200M0 210H1200M0 315H1200M0 420H1200M0 525H1200"/>
    <path d="M150 0V630M300 0V630M450 0V630M600 0V630M750 0V630M900 0V630M1050 0V630"/>
  </g>

  <!-- Brand mark + name -->
  <g transform="translate(70 70)">
    <rect width="44" height="44" rx="12" fill="#0F1D3A" stroke="rgba(34,211,183,0.45)"/>
    <g transform="translate(10 10) scale(1.05)"><path d="M2 2L24 12L2 22V14L14 12L2 10V2Z" fill="url(#og-mark)"/></g>
    <text x="62" y="22" font-family="Inter Display, Inter, sans-serif" font-weight="700" font-size="20" fill="#F7F9FC">ShadowBlade</text>
    <text x="62" y="40" font-family="Inter, sans-serif" font-size="11" letter-spacing="2.4" fill="#8590A8" font-weight="600">VIDEO CLOUD · ENTERPRISE</text>
  </g>

  <!-- Chip -->
  <g transform="translate(70 178)">
    <rect width="252" height="34" rx="17" fill="rgba(34,211,183,0.10)" stroke="rgba(34,211,183,0.35)"/>
    <circle cx="20" cy="17" r="4.5" fill="#22D3B7"/>
    <text x="36" y="22" font-family="Inter, sans-serif" font-size="12" letter-spacing="2.4" font-weight="700" fill="#22D3B7">ENTERPRISE AI VIDEO CLOUD</text>
  </g>

  <!-- Headline -->
  <g transform="translate(70 240)" font-family="Inter Display, Inter, sans-serif" fill="#F7F9FC">
    <text font-size="64" font-weight="700" letter-spacing="-1.8">
      <tspan x="0" y="0">From brief to broadcast-</tspan>
      <tspan x="0" y="76">ready video in </tspan>
      <tspan font-weight="800" fill="url(#og-text)">4 minutes</tspan><tspan>.</tspan>
    </text>
  </g>

  <!-- Sub copy -->
  <text x="70" y="476" font-family="Inter, sans-serif" font-size="18" fill="#B6BDCC">The enterprise pipeline marketing, training, and product teams ship on.</text>

  <!-- Right side: rendering chip + ring -->
  <g transform="translate(960 315)">
    <circle r="180" fill="none" stroke="url(#og-mark)" stroke-width="1.4" stroke-dasharray="3 7" opacity="0.55"/>
    <circle r="130" fill="none" stroke="rgba(34,211,183,0.32)" stroke-width="1"/>
    <circle r="80" fill="none" stroke="rgba(34,211,183,0.22)"/>
    <circle r="56" fill="url(#og-card)" stroke="rgba(34,211,183,0.55)"/>
    <path d="M-14 -20L24 0L-14 20Z" fill="#22D3B7"/>
  </g>

  <!-- Rendering chip floating -->
  <g transform="translate(820 270)">
    <rect width="170" height="56" rx="12" fill="rgba(8,14,28,0.92)" stroke="rgba(34,211,183,0.6)"/>
    <circle cx="22" cy="28" r="5" fill="#22D3B7"/>
    <circle cx="22" cy="28" r="9" fill="none" stroke="#22D3B7" stroke-opacity="0.35" stroke-width="1.4"/>
    <text x="40" y="24" font-family="Inter, sans-serif" font-size="10" fill="#8590A8" font-weight="600" letter-spacing="2">RENDERING</text>
    <text x="40" y="44" font-family="Inter Display, Inter, sans-serif" font-size="18" fill="#F7F9FC" font-weight="700">ETA 64s</text>
  </g>

  <!-- Footer strip: trust -->
  <g transform="translate(70 552)" font-family="Inter, sans-serif">
    <text font-size="11" letter-spacing="3" font-weight="600" fill="#5A667F">SOC 2 · SSO · REGIONAL RENDER · ENTERPRISE READY</text>
    <text x="0" y="36" font-size="14" font-weight="600" fill="#22D3B7">shadowblade.video</text>
  </g>

  <!-- Bottom-right tagline -->
  <g transform="translate(1130 600)" font-family="Inter, sans-serif" fill="#5A667F" font-size="11" letter-spacing="2" text-anchor="end">
    <text>© 2026 SHADOWBLADE LABS</text>
  </g>
</svg>
