    <text x="0" y="62" font-size="40" font-weight="700" letter-spacing="-1.2">ShadowBlade</text>
    <text x="2" y="90" font-size="12" font-weight="600" letter-spacing="3.4" fill="#8590A8">VIDEO CLOUD · ENTERPRISE</text>
