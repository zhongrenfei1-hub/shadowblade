      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="sb-logo-mark-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#142A55"/>
      <stop offset="100%" stop-color="#0A1428"/>
    </linearGradient>
