<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Render queue is clear — no active jobs">
  <defs>
    <linearGradient id="sb-empty-queue-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1D3A"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="sb-empty-queue-glow" cx="0.50" cy="0.42" r="0.45">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="360" fill="url(#sb-empty-queue-bg)"/>
  <rect width="640" height="360" fill="url(#sb-empty-queue-glow)"/>

  <!-- Faint dot grid -->
  <g fill="rgba(255,255,255,0.05)">
    <circle cx="80" cy="80" r="1"/><circle cx="160" cy="80" r="1"/><circle cx="240" cy="80" r="1"/><circle cx="320" cy="80" r="1"/><circle cx="400" cy="80" r="1"/><circle cx="480" cy="80" r="1"/><circle cx="560" cy="80" r="1"/>
    <circle cx="80" cy="160" r="1"/><circle cx="160" cy="160" r="1"/><circle cx="240" cy="160" r="1"/><circle cx="320" cy="160" r="1"/><circle cx="400" cy="160" r="1"/><circle cx="480" cy="160" r="1"/><circle cx="560" cy="160" r="1"/>
    <circle cx="80" cy="240" r="1"/><circle cx="160" cy="240" r="1"/><circle cx="240" cy="240" r="1"/><circle cx="320" cy="240" r="1"/><circle cx="400" cy="240" r="1"/><circle cx="480" cy="240" r="1"/><circle cx="560" cy="240" r="1"/>
  </g>

  <!-- Cluster grid: 4x3 of empty slots (no jobs) -->
  <g transform="translate(320 168)">
    <g stroke="#5A667F" stroke-width="1.2" fill="rgba(11,19,38,0.6)" stroke-dasharray="3 3">
      <rect x="-156" y="-44" width="72" height="32" rx="6"/>
      <rect x="-78" y="-44" width="72" height="32" rx="6"/>
      <rect x="0" y="-44" width="72" height="32" rx="6"/>
      <rect x="78" y="-44" width="72" height="32" rx="6"/>

      <rect x="-156" y="-4" width="72" height="32" rx="6"/>
      <rect x="-78" y="-4" width="72" height="32" rx="6"/>
      <rect x="0" y="-4" width="72" height="32" rx="6"/>
      <rect x="78" y="-4" width="72" height="32" rx="6"/>

      <rect x="-156" y="36" width="72" height="32" rx="6"/>
      <rect x="-78" y="36" width="72" height="32" rx="6"/>
      <rect x="0" y="36" width="72" height="32" rx="6"/>
      <rect x="78" y="36" width="72" height="32" rx="6"/>
    </g>

    <!-- One accent slot with a calm pulse / "ready" indicator -->
    <g transform="translate(0 -4)">
      <rect x="0" y="0" width="72" height="32" rx="6" fill="rgba(34,211,183,0.10)" stroke="#22D3B7" stroke-width="1.2"/>
      <circle cx="14" cy="16" r="4" fill="#22D3B7"/>
      <circle cx="14" cy="16" r="8" fill="none" stroke="#22D3B7" stroke-opacity="0.35"/>
      <text x="26" y="20" font-family="JetBrains Mono, monospace" font-size="10" fill="#22D3B7" font-weight="700">IDLE</text>
    </g>

    <!-- Worker label -->
    <text y="-60" font-family="Inter, sans-serif" font-size="10" fill="#5A667F" font-weight="700" letter-spacing="2.4" text-anchor="middle">RENDER FARM &#183; 12 WORKERS</text>
  </g>

  <!-- Copy -->
  <g transform="translate(320 280)" font-family="Inter Display, Inter, sans-serif" text-anchor="middle">
    <text font-size="20" font-weight="600" fill="#F7F9FC" letter-spacing="-0.4">Queue is clear</text>
    <text y="26" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#8590A8">No jobs running. Farm is warm and waiting.</text>
  </g>
</svg>
