<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Empty asset library — upload a logo, font, or brand kit">
  <defs>
    <linearGradient id="sb-empty-assets-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1D3A"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="sb-empty-assets-glow" cx="0.50" cy="0.42" r="0.45">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="360" fill="url(#sb-empty-assets-bg)"/>
  <rect width="640" height="360" fill="url(#sb-empty-assets-glow)"/>

  <!-- Faint dot grid -->
  <g fill="rgba(255,255,255,0.05)">
    <circle cx="80" cy="80" r="1"/><circle cx="160" cy="80" r="1"/><circle cx="240" cy="80" r="1"/><circle cx="320" cy="80" r="1"/><circle cx="400" cy="80" r="1"/><circle cx="480" cy="80" r="1"/><circle cx="560" cy="80" r="1"/>
    <circle cx="80" cy="160" r="1"/><circle cx="160" cy="160" r="1"/><circle cx="240" cy="160" r="1"/><circle cx="320" cy="160" r="1"/><circle cx="400" cy="160" r="1"/><circle cx="480" cy="160" r="1"/><circle cx="560" cy="160" r="1"/>
    <circle cx="80" cy="240" r="1"/><circle cx="160" cy="240" r="1"/><circle cx="240" cy="240" r="1"/><circle cx="320" cy="240" r="1"/><circle cx="400" cy="240" r="1"/><circle cx="480" cy="240" r="1"/><circle cx="560" cy="240" r="1"/>
  </g>

  <!-- Stacked frame illustration -->
  <g transform="translate(320 168)" stroke="#8590A8" stroke-width="1.6" fill="none" stroke-linejoin="round">
    <!-- Back frame -->
    <g transform="translate(-92 -52) rotate(-8)" opacity="0.65">
      <rect x="0" y="0" width="160" height="100" rx="8"/>
      <circle cx="34" cy="32" r="8"/>
      <path d="M16 78L56 50L96 70L144 38"/>
    </g>
    <!-- Mid frame -->
    <g transform="translate(-44 -42) rotate(-2)" opacity="0.85">
      <rect x="0" y="0" width="160" height="100" rx="8" fill="rgba(11,19,38,0.96)"/>
      <circle cx="34" cy="32" r="8"/>
      <path d="M16 78L56 50L96 70L144 38"/>
    </g>
    <!-- Front frame (accent) -->
    <g transform="translate(-2 -28) rotate(4)">
      <rect x="0" y="0" width="160" height="100" rx="8" fill="rgba(11,19,38,1)" stroke="#38BDF8"/>
      <circle cx="34" cy="32" r="8" stroke="#38BDF8"/>
      <path d="M16 78L56 50L96 70L144 38" stroke="#38BDF8"/>
      <!-- corner upload mark -->
      <g transform="translate(132 14)" stroke="#38BDF8">
        <circle r="10" fill="rgba(56,189,248,0.18)" stroke-dasharray="3 3"/>
        <path d="M0 -4V4M-4 0H4" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- Copy -->
  <g transform="translate(320 264)" font-family="Inter Display, Inter, sans-serif" text-anchor="middle">
    <text font-size="20" font-weight="600" fill="#F7F9FC" letter-spacing="-0.4">Library is empty</text>
    <text y="26" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#8590A8">Upload a logo, font, or brand kit to begin.</text>
  </g>

  <!-- CTA chip -->
  <g transform="translate(254 312)">
    <rect width="132" height="32" rx="8" fill="rgba(56,189,248,0.14)" stroke="rgba(56,189,248,0.45)"/>
    <text x="66" y="21" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#38BDF8" text-anchor="middle" letter-spacing="0.4">Upload assets</text>
  </g>
</svg>
