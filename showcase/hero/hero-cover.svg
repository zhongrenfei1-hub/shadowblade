<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="ShadowBlade pipeline ring with floating UI cards and rendering ETA chip">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="55%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="hero-glow" cx="0.62" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#22D3B7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hero-glow-2" cx="0.18" cy="0.18" r="0.4">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hero-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="hero-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2842"/>
      <stop offset="100%" stop-color="#0B1326"/>
    </linearGradient>
    <linearGradient id="hero-text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="hero-meter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#hero-bg)"/>
  <rect width="1600" height="900" fill="url(#hero-glow)"/>
  <rect width="1600" height="900" fill="url(#hero-glow-2)"/>

  <!-- Background grid -->
  <g stroke="rgba(255,255,255,0.035)" stroke-width="1">
    <path d="M0 150H1600M0 300H1600M0 450H1600M0 600H1600M0 750H1600"/>
    <path d="M150 0V900M300 0V900M450 0V900M600 0V900M750 0V900M900 0V900M1050 0V900M1200 0V900M1350 0V900M1500 0V900"/>
  </g>

  <!-- Eyebrow + tag chip -->
  <g transform="translate(96 96)">
    <rect width="220" height="32" rx="16" fill="rgba(34,211,183,0.10)" stroke="rgba(34,211,183,0.35)"/>
    <circle cx="18" cy="16" r="4" fill="#22D3B7"/>
    <text x="32" y="21" font-family="Inter, sans-serif" font-size="12" fill="#22D3B7" font-weight="600" letter-spacing="2.2">ENTERPRISE AI VIDEO CLOUD</text>
  </g>

  <!-- Headline -->
  <g transform="translate(96 200)" font-family="Inter Display, Inter, sans-serif" fill="#F7F9FC">
    <text font-size="78" font-weight="600" letter-spacing="-2.2">
      <tspan x="0" y="0">From brief to broadcast-</tspan>
      <tspan x="0" y="90">ready video in </tspan>
      <tspan font-weight="700" fill="url(#hero-text-grad)">4 minutes</tspan><tspan>.</tspan>
    </text>
    <text x="0" y="200" font-family="Inter, sans-serif" font-size="22" font-weight="400" fill="#B6BDCC" letter-spacing="-0.2">
      <tspan x="0" dy="0">Marketing, training, and product teams ship on-brand,</tspan>
      <tspan x="0" dy="30">on-guideline cuts faster than a single round of feedback.</tspan>
    </text>
  </g>

  <!-- CTA row -->
  <g transform="translate(96 660)" font-family="Inter, sans-serif">
    <g>
      <rect width="220" height="50" rx="8" fill="url(#hero-text-grad)"/>
      <text x="110" y="32" font-size="15" font-weight="700" fill="#0A1428" text-anchor="middle">Open the workspace →</text>
    </g>
    <g transform="translate(244 0)">
      <rect width="220" height="50" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.18)"/>
      <text x="110" y="32" font-size="15" font-weight="600" fill="#F7F9FC" text-anchor="middle">Watch the 90s tour</text>
    </g>
  </g>

  <!-- Trust strip -->
  <g transform="translate(96 760)" font-family="Inter, sans-serif" fill="#5A667F">
    <text font-size="11" font-weight="600" letter-spacing="3">TRUSTED BY ENTERPRISE TEAMS</text>
    <g transform="translate(0 28)" fill="#8590A8" font-weight="700" font-family="Inter Display, Inter, sans-serif" font-size="18" letter-spacing="2">
      <text x="0" y="14">HELIOS</text>
      <text x="120" y="14">NORTHWIND</text>
      <text x="280" y="14">UMBRA·CO</text>
      <text x="420" y="14">FABRIK</text>
      <text x="540" y="14">QUANTA</text>
    </g>
  </g>

  <!-- Right side: pipeline ring composition -->
  <g transform="translate(1100 450)">
    <!-- Outer dashed ring -->
    <circle r="290" fill="none" stroke="url(#hero-ring)" stroke-width="1.5" stroke-dasharray="3 7" opacity="0.55"/>
    <circle r="220" fill="none" stroke="rgba(34,211,183,0.32)" stroke-width="1"/>
    <circle r="150" fill="none" stroke="rgba(34,211,183,0.18)" stroke-width="1"/>

    <!-- Step markers around outer ring -->
    <g fill="#22D3B7">
      <circle cx="0" cy="-290" r="5"/>
      <circle cx="276" cy="-89" r="5"/>
      <circle cx="170" cy="234" r="5"/>
      <circle cx="-170" cy="234" r="5"/>
      <circle cx="-276" cy="-89" r="5"/>
    </g>

    <!-- Center play disk -->
    <circle r="84" fill="url(#hero-card)" stroke="rgba(34,211,183,0.55)" stroke-width="1.5"/>
    <circle r="84" fill="none" stroke="rgba(34,211,183,0.18)" stroke-width="16" stroke-dasharray="200 600" stroke-dashoffset="-120"/>
    <path d="M-20 -28L36 0L-20 28Z" fill="#22D3B7"/>
    <text y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8590A8" letter-spacing="2.6">PIPELINE</text>
  </g>

  <!-- Node card: Brief & brand -->
  <g transform="translate(700 188)">
    <rect width="260" height="80" rx="14" fill="url(#hero-card)" stroke="rgba(255,255,255,0.10)"/>
    <rect x="20" y="20" width="40" height="40" rx="10" fill="rgba(34,211,183,0.16)"/>
    <path d="M30 36h20M30 44h14" stroke="#22D3B7" stroke-width="1.6"/>
    <text x="76" y="34" font-family="Inter, sans-serif" font-size="11" fill="#8590A8" font-weight="600" letter-spacing="2.4">STEP 01</text>
    <text x="76" y="58" font-family="Inter Display, Inter, sans-serif" font-size="17" font-weight="600" fill="#F7F9FC">Brief &amp; brand kit</text>
  </g>

  <!-- Node card: Storyboard & voice -->
  <g transform="translate(1340 168)">
    <rect width="240" height="80" rx="14" fill="url(#hero-card)" stroke="rgba(255,255,255,0.10)"/>
    <rect x="20" y="20" width="40" height="40" rx="10" fill="rgba(56,189,248,0.16)"/>
    <path d="M28 32l10 8 10-8M28 42l10 8 10-8" stroke="#38BDF8" stroke-width="1.6" fill="none"/>
    <text x="76" y="34" font-family="Inter, sans-serif" font-size="11" fill="#8590A8" font-weight="600" letter-spacing="2.4">STEP 02</text>
    <text x="76" y="58" font-family="Inter Display, Inter, sans-serif" font-size="17" font-weight="600" fill="#F7F9FC">Storyboard &amp; voice</text>
  </g>

  <!-- Node card: Compose & captions -->
  <g transform="translate(1340 700)">
    <rect width="240" height="80" rx="14" fill="url(#hero-card)" stroke="rgba(255,255,255,0.10)"/>
    <rect x="20" y="20" width="40" height="40" rx="10" fill="rgba(167,139,250,0.16)"/>
    <path d="M28 30h24M28 38h18M28 46h22" stroke="#A78BFA" stroke-width="1.6"/>
    <text x="76" y="34" font-family="Inter, sans-serif" font-size="11" fill="#8590A8" font-weight="600" letter-spacing="2.4">STEP 03</text>
    <text x="76" y="58" font-family="Inter Display, Inter, sans-serif" font-size="17" font-weight="600" fill="#F7F9FC">Compose &amp; caption</text>
  </g>

  <!-- Node card: Render & ship -->
  <g transform="translate(700 700)">
    <rect width="260" height="80" rx="14" fill="url(#hero-card)" stroke="rgba(255,255,255,0.10)"/>
    <rect x="20" y="20" width="40" height="40" rx="10" fill="rgba(251,191,36,0.16)"/>
    <path d="M40 28l8 12-8 12-8-12Z" fill="none" stroke="#FBBF24" stroke-width="1.6"/>
    <text x="76" y="34" font-family="Inter, sans-serif" font-size="11" fill="#8590A8" font-weight="600" letter-spacing="2.4">STEP 04</text>
    <text x="76" y="58" font-family="Inter Display, Inter, sans-serif" font-size="17" font-weight="600" fill="#F7F9FC">Render &amp; ship</text>
  </g>

  <!-- Connectors from cards to ring -->
  <g stroke="rgba(34,211,183,0.42)" stroke-width="1.1" fill="none" stroke-dasharray="3 5">
    <path d="M960 228 Q 1020 270 1080 300"/>
    <path d="M1340 208 Q 1260 280 1180 340"/>
    <path d="M1340 740 Q 1240 660 1170 580"/>
    <path d="M960 740 Q 1020 660 1070 580"/>
  </g>

  <!-- Rendering chip · ETA 64s (foreground, floating right of ring) -->
  <g transform="translate(1410 432)">
    <rect width="170" height="56" rx="12" fill="rgba(8,14,28,0.92)" stroke="rgba(34,211,183,0.6)" stroke-width="1"/>
    <circle cx="22" cy="28" r="5" fill="#22D3B7"/>
    <circle cx="22" cy="28" r="9" fill="none" stroke="#22D3B7" stroke-opacity="0.35" stroke-width="1.4"/>
    <text x="40" y="24" font-family="Inter, sans-serif" font-size="10" fill="#8590A8" font-weight="600" letter-spacing="2">RENDERING</text>
    <text x="40" y="44" font-family="Inter Display, Inter, sans-serif" font-size="18" fill="#F7F9FC" font-weight="700">ETA 64s</text>
  </g>

  <!-- Floating mini card · progress meter -->
  <g transform="translate(820 450)">
    <rect width="200" height="72" rx="12" fill="rgba(8,14,28,0.92)" stroke="rgba(255,255,255,0.10)"/>
    <text x="16" y="22" font-family="Inter, sans-serif" font-size="10" fill="#8590A8" font-weight="600" letter-spacing="2.2">COMPOSITION</text>
    <text x="16" y="42" font-family="Inter Display, Inter, sans-serif" font-size="16" font-weight="700" fill="#F7F9FC">62% complete</text>
    <rect x="16" y="52" width="168" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="16" y="52" width="104" height="6" rx="3" fill="url(#hero-meter)"/>
  </g>

  <!-- Floating chip · scene strip -->
  <g transform="translate(820 568)">
    <rect width="280" height="56" rx="12" fill="rgba(8,14,28,0.92)" stroke="rgba(255,255,255,0.10)"/>
    <g transform="translate(14 14)">
      <rect width="40" height="28" rx="4" fill="rgba(34,211,183,0.18)" stroke="rgba(34,211,183,0.5)"/>
      <rect x="48" width="40" height="28" rx="4" fill="rgba(56,189,248,0.16)" stroke="rgba(56,189,248,0.4)"/>
      <rect x="96" width="40" height="28" rx="4" fill="rgba(167,139,250,0.16)" stroke="rgba(167,139,250,0.4)"/>
      <rect x="144" width="40" height="28" rx="4" fill="rgba(251,191,36,0.14)" stroke="rgba(251,191,36,0.4)"/>
      <rect x="192" width="40" height="28" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
    </g>
    <text x="14" y="50" font-family="Inter, sans-serif" font-size="10" fill="#8590A8" letter-spacing="2" font-weight="600">SCENES · 5 of 6 rendered</text>
  </g>

  <!-- Bottom corner accent -->
  <g transform="translate(1430 836)" font-family="Inter, sans-serif" fill="#5A667F">
    <text font-size="10" letter-spacing="2.2" font-weight="600">SOC 2 · SSO · REGIONAL RENDER</text>
  </g>
</svg>
