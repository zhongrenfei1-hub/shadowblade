      <g>
        <rect width="304" height="232" rx="12" fill="url(#sb-press-card)" stroke="rgba(255,255,255,0.06)"/>
        <rect width="304" height="160" rx="12" fill="url(#sb-press-logo-art)"/>
        <g transform="translate(60 64)">
          <path d="M14 14L46 30L14 46V36L30 30L14 24V14Z" fill="url(#sb-press-mark)"/>
          <text x="58" y="38" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#F7F9FC">ShadowBlade</text>
        </g>
        <g transform="translate(16 176)">
          <text font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#F7F9FC">主版 · 渐变 · 深色</text>
          <text y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A667F">logo-primary-dark.svg</text>
        </g>
        <g transform="translate(0 212)" font-family="JetBrains Mono, monospace" font-size="10" fill="#6EE2C5">
          <rect width="304" height="20" fill="rgba(255,255,255,0.02)"/>
          <text x="16" y="14">SVG</text>
          <text x="56" y="14">PNG 1024</text>
          <text x="120" y="14">PDF</text>
          <text x="288" y="14" text-anchor="end" fill="#5A667F">3.2 KB</text>
        </g>
      </g>
      <!-- Tile 2 · mono on light -->
      <g transform="translate(316 0)">
        <rect width="304" height="232" rx="12" fill="url(#sb-press-card)" stroke="rgba(255,255,255,0.06)"/>
        <rect width="304" height="160" rx="12" fill="#F7F9FC"/>
        <g transform="translate(60 64)">
          <path d="M14 14L46 30L14 46V36L30 30L14 24V14Z" fill="#0F2A4A"/>
          <text x="58" y="38" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0F2A4A">ShadowBlade</text>
        </g>
        <g transform="translate(16 176)">
          <text font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#F7F9FC">单色 · 浅色背景</text>
          <text y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A667F">logo-mono-light.svg</text>
        </g>
        <g transform="translate(0 212)" font-family="JetBrains Mono, monospace" font-size="10" fill="#6EE2C5">
          <rect width="304" height="20" fill="rgba(255,255,255,0.02)"/>
          <text x="16" y="14">SVG</text>
          <text x="56" y="14">PNG 1024</text>
          <text x="120" y="14">PDF</text>
          <text x="288" y="14" text-anchor="end" fill="#5A667F">2.1 KB</text>
        </g>
