<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" role="img" aria-label="ShadowBlade Press Kit screen mockup">
  <defs>
    <linearGradient id="sb-press-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <linearGradient id="sb-press-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(22,30,48,0.95)"/>
      <stop offset="100%" stop-color="rgba(15,22,38,0.85)"/>
    </linearGradient>
    <linearGradient id="sb-press-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="sb-press-logo-art" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="100%" stop-color="#050A18"/>
    </linearGradient>
    <linearGradient id="sb-press-accent-art" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="sb-press-thumb-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="sb-press-glow" cx="0.85" cy="0.05" r="0.6">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="#06101F"/>
  <rect width="1600" height="1000" fill="url(#sb-press-bg)"/>
  <rect width="1600" height="1000" fill="url(#sb-press-glow)"/>

  <!-- ── Marketing nav ── -->
  <g transform="translate(0 0)">
    <rect width="1600" height="76" fill="rgba(8,14,28,0.6)" stroke="rgba(255,255,255,0.06)"/>
    <g transform="translate(160 22)">
      <rect width="32" height="32" rx="10" fill="#0F1D3A" stroke="rgba(34,211,183,0.30)"/>
      <g transform="translate(7 7) scale(0.75)"><path d="M2 2L24 12L2 22V14L14 12L2 10V2Z" fill="url(#sb-press-mark)"/></g>
      <text x="46" y="16" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#F7F9FC">ShadowBlade</text>
      <text x="46" y="30" font-family="Inter, system-ui, sans-serif" font-size="10" letter-spacing="1.2" fill="#5A667F">媒体资源</text>
    </g>
    <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#B6BDCC">
      <text x="876" y="46">关于我们</text>
      <text x="958" y="46">更新日志</text>
      <text x="1040" y="46">客户案例</text>
      <text x="1130" y="46" fill="#F7F9FC" font-weight="700">媒体</text>
    </g>
    <g transform="translate(1200 22)">
