          <rect x="10" y="10" width="80" height="92" rx="4" fill="rgba(34,211,183,0.10)"/>
          <rect x="100" y="10" width="70" height="38" rx="4" fill="rgba(255,255,255,0.06)"/>
          <rect x="100" y="56" width="70" height="46" rx="4" fill="rgba(167,139,250,0.18)"/>
          <text x="10" y="130" font-family="JetBrains Mono, monospace" font-size="10" fill="#8590A8">screen-studio.svg</text>
        </g>
        <g transform="translate(392 0)">
          <rect width="180" height="112" rx="10" fill="#0B1326" stroke="rgba(255,255,255,0.06)"/>
          <g transform="translate(10 14)" font-family="JetBrains Mono, monospace" font-size="8" fill="#6EE2C5">
            <rect width="160" height="18" rx="3" fill="rgba(34,211,183,0.12)"/>
            <rect y="22" width="160" height="18" rx="3" fill="rgba(56,189,248,0.12)"/>
            <rect y="44" width="160" height="18" rx="3" fill="rgba(251,191,36,0.12)"/>
            <rect y="66" width="160" height="18" rx="3" fill="rgba(255,255,255,0.04)"/>
          </g>
