          <text y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A667F">mark-square.svg</text>
        </g>
        <g transform="translate(0 212)" font-family="JetBrains Mono, monospace" font-size="10" fill="#6EE2C5">
          <rect width="304" height="20" fill="rgba(255,255,255,0.02)"/>
          <text x="16" y="14">SVG</text>
          <text x="56" y="14">PNG 512</text>
          <text x="112" y="14">ICO</text>
          <text x="288" y="14" text-anchor="end" fill="#5A667F">0.8 KB</text>
        </g>
      </g>
