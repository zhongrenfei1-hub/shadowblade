        </g>
        <g transform="translate(16 176)">
          <text font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#F7F9FC">反色 · 强调色背景</text>
          <text y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#5A667F">logo-mono-inverse.svg</text>
        </g>
        <g transform="translate(0 212)" font-family="JetBrains Mono, monospace" font-size="10" fill="#6EE2C5">
          <rect width="304" height="20" fill="rgba(255,255,255,0.02)"/>
          <text x="16" y="14">SVG</text>
          <text x="56" y="14">PNG 1024</text>
          <text x="120" y="14">PDF</text>
          <text x="288" y="14" text-anchor="end" fill="#5A667F">2.1 KB</text>
        </g>
