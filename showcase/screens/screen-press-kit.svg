        <text x="14" y="106" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#F7F9FC">石墨灰</text>
        <text x="14" y="124" fill="#F7F9FC">#11161F</text>
      </g>
      <g transform="translate(636 0)">
        <rect width="200" height="140" rx="10" fill="#F7F9FC"/>
        <text x="14" y="106" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A1428">雾白</text>
        <text x="14" y="124" fill="#0A1428">#F7F9FC</text>
      </g>
      <g transform="translate(848 0)">
