          <rect x="10" y="10" width="32" height="92" rx="4" fill="rgba(255,255,255,0.06)"/>
          <rect x="52" y="14" width="118" height="10" rx="3" fill="rgba(255,255,255,0.12)"/>
          <rect x="52" y="32" width="56" height="20" rx="4" fill="rgba(34,211,183,0.30)"/>
          <rect x="114" y="32" width="56" height="20" rx="4" fill="rgba(56,189,248,0.30)"/>
          <rect x="52" y="60" width="118" height="42" rx="4" fill="rgba(34,211,183,0.10)"/>
          <text x="10" y="130" font-family="JetBrains Mono, monospace" font-size="10" fill="#8590A8">screen-dashboard.svg</text>
        </g>
        <g transform="translate(196 0)">
