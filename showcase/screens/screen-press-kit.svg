      <g transform="translate(18 14)" fill="none" stroke="#0A1428" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></g>
      <text x="120" y="30" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A1428">媒体资源 ZIP · 28 MB</text>
      <g transform="translate(252 0)">
