  <!-- ── Hero ── -->
  <g transform="translate(160 110)">
    <text font-family="Inter, system-ui, sans-serif" font-size="11" letter-spacing="2.6" font-weight="700" fill="#6EE2C5">媒体资源 · v2026.5</text>
    <text y="48" font-family="Inter Display, Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#F7F9FC" letter-spacing="-0.9">Logo、截图、色板、事实。</text>
    <text y="84" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#B6BDCC">写关于 ShadowBlade 的内容你需要的一切 — 无需先发邮件给我们。</text>

    <g transform="translate(820 24)">
