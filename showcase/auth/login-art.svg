<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200" role="img" aria-label="Sign-in side panel artwork — pipeline orbit, scene strip, and ETA chip">
  <defs>
    <linearGradient id="sb-login-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="55%" stop-color="#0A1428"/>
      <stop offset="100%" stop-color="#06101F"/>
    </linearGradient>
    <radialGradient id="sb-login-glow" cx="0.50" cy="0.42" r="0.55">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#22D3B7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sb-login-glow-2" cx="0.18" cy="0.85" r="0.45">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sb-login-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="sb-login-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="sb-login-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2842"/>
      <stop offset="100%" stop-color="#0B1326"/>
    </linearGradient>
    <linearGradient id="sb-login-meter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3B7"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <rect width="900" height="1200" fill="url(#sb-login-bg)"/>
  <rect width="900" height="1200" fill="url(#sb-login-glow)"/>
  <rect width="900" height="1200" fill="url(#sb-login-glow-2)"/>

  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.035)" stroke-width="1">
    <path d="M0 200H900M0 400H900M0 600H900M0 800H900M0 1000H900"/>
    <path d="M150 0V1200M300 0V1200M450 0V1200M600 0V1200M750 0V1200"/>
  </g>

  <!-- Eyebrow / brand chip -->
  <g transform="translate(72 96)">
    <rect width="200" height="32" rx="16" fill="rgba(34,211,183,0.10)" stroke="rgba(34,211,183,0.35)"/>
    <circle cx="18" cy="16" r="4" fill="#22D3B7"/>
    <text x="32" y="21" font-family="Inter, sans-serif" font-size="11" fill="#22D3B7" font-weight="700" letter-spacing="2.4">视频工厂</text>
  </g>

  <!-- Heading lockup top -->
  <g transform="translate(72 168)" font-family="Inter Display, Inter, sans-serif" fill="#F7F9FC">
    <text font-size="46" font-weight="600" letter-spacing="-1.6">
      <tspan x="0" y="0">登录你的</tspan>
      <tspan x="0" y="58" font-weight="700" fill="url(#sb-login-text)">视频工厂</tspan><tspan>。</tspan>
    </text>
    <text x="0" y="116" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#B6BDCC">流水线会从你上次离开的地方继续。</text>
  </g>

  <!-- Concentric ring composition (centered) -->
  <g transform="translate(450 660)">
    <circle r="330" fill="none" stroke="url(#sb-login-ring)" stroke-width="1.5" stroke-dasharray="3 7" opacity="0.45"/>
    <circle r="260" fill="none" stroke="rgba(34,211,183,0.28)" stroke-width="1"/>
    <circle r="190" fill="none" stroke="rgba(34,211,183,0.18)" stroke-width="1"/>
    <circle r="120" fill="none" stroke="rgba(34,211,183,0.12)" stroke-width="1"/>

    <!-- Orbit nodes (pipeline stages) -->
    <g>
      <circle cx="0" cy="-330" r="6" fill="#22D3B7"/>
      <circle cx="314" cy="-102" r="6" fill="#38BDF8"/>
      <circle cx="194" cy="266" r="6" fill="#A78BFA"/>
      <circle cx="-194" cy="266" r="6" fill="#FBBF24"/>
      <circle cx="-314" cy="-102" r="6" fill="#22D3B7"/>
    </g>

    <!-- Tick marks on inner ring -->
    <g stroke="rgba(34,211,183,0.4)" stroke-width="1">
      <line x1="0" y1="-260" x2="0" y2="-244"/>
      <line x1="184" y1="-184" x2="173" y2="-173"/>
      <line x1="260" y1="0" x2="244" y2="0"/>
      <line x1="184" y1="184" x2="173" y2="173"/>
      <line x1="0" y1="260" x2="0" y2="244"/>
      <line x1="-184" y1="184" x2="-173" y2="173"/>
      <line x1="-260" y1="0" x2="-244" y2="0"/>
      <line x1="-184" y1="-184" x2="-173" y2="-173"/>
    </g>

    <!-- Center play disk -->
    <circle r="92" fill="url(#sb-login-card)" stroke="rgba(34,211,183,0.55)" stroke-width="1.5"/>
    <circle r="92" fill="none" stroke="rgba(34,211,183,0.18)" stroke-width="18" stroke-dasharray="220 660" stroke-dashoffset="-140"/>
    <path d="M-22 -30L40 0L-22 30Z" fill="#22D3B7"/>
    <text y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#8590A8" letter-spacing="2.6">流水线就绪</text>
  </g>

  <!-- ETA chip · floating top-right of ring -->
  <g transform="translate(640 478)">
    <rect width="180" height="60" rx="14" fill="rgba(8,14,28,0.92)" stroke="rgba(34,211,183,0.55)" stroke-width="1"/>
    <circle cx="22" cy="30" r="5" fill="#22D3B7"/>
    <circle cx="22" cy="30" r="10" fill="none" stroke="#22D3B7" stroke-opacity="0.35" stroke-width="1.4"/>
    <text x="40" y="25" font-family="Inter, sans-serif" font-size="10" fill="#8590A8" font-weight="700" letter-spacing="2.2">渲染中</text>
    <text x="40" y="46" font-family="Inter Display, Inter, sans-serif" font-size="20" fill="#F7F9FC" font-weight="700">预计 64 秒</text>
  </g>

  <!-- Scene strip · floating left of ring -->
  <g transform="translate(80 762)">
    <rect width="296" height="72" rx="14" fill="rgba(8,14,28,0.92)" stroke="rgba(255,255,255,0.10)"/>
    <text x="16" y="22" font-family="Inter, sans-serif" font-size="10" fill="#8590A8" font-weight="700" letter-spacing="2.2">场景 &#183; 5 / 6</text>
    <g transform="translate(14 32)">
      <rect width="50" height="30" rx="5" fill="rgba(34,211,183,0.22)" stroke="rgba(34,211,183,0.5)"/>
      <rect x="56" width="50" height="30" rx="5" fill="rgba(56,189,248,0.18)" stroke="rgba(56,189,248,0.5)"/>
      <rect x="112" width="50" height="30" rx="5" fill="rgba(167,139,250,0.18)" stroke="rgba(167,139,250,0.5)"/>
      <rect x="168" width="50" height="30" rx="5" fill="rgba(251,191,36,0.16)" stroke="rgba(251,191,36,0.45)"/>
      <rect x="224" width="50" height="30" rx="5" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-dasharray="3 3"/>
    </g>
  </g>

  <!-- Progress meter · floating right-below ring -->
  <g transform="translate(540 880)">
    <rect width="280" height="80" rx="14" fill="rgba(8,14,28,0.92)" stroke="rgba(255,255,255,0.10)"/>
    <text x="18" y="24" font-family="Inter, sans-serif" font-size="10" fill="#8590A8" font-weight="700" letter-spacing="2.2">合成</text>
    <text x="18" y="46" font-family="Inter Display, Inter, sans-serif" font-size="18" font-weight="700" fill="#F7F9FC">已完成 62%</text>
    <rect x="18" y="58" width="244" height="6" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="18" y="58" width="151" height="6" rx="3" fill="url(#sb-login-meter)"/>
  </g>

  <!-- Step legend bottom -->
  <g transform="translate(72 1020)" font-family="Inter, sans-serif">
    <text font-size="10" fill="#8590A8" font-weight="700" letter-spacing="2.6">流水线阶段</text>
    <g transform="translate(0 18)">
      <g><circle cx="6" cy="10" r="4" fill="#22D3B7"/><text x="18" y="14" font-size="11" fill="#B6BDCC" font-weight="500">简报</text></g>
      <g transform="translate(74 0)"><circle cx="6" cy="10" r="4" fill="#38BDF8"/><text x="18" y="14" font-size="11" fill="#B6BDCC" font-weight="500">分镜</text></g>
      <g transform="translate(186 0)"><circle cx="6" cy="10" r="4" fill="#A78BFA"/><text x="18" y="14" font-size="11" fill="#B6BDCC" font-weight="500">合成</text></g>
      <g transform="translate(290 0)"><circle cx="6" cy="10" r="4" fill="#FBBF24"/><text x="18" y="14" font-size="11" fill="#B6BDCC" font-weight="500">渲染</text></g>
      <g transform="translate(372 0)"><circle cx="6" cy="10" r="4" fill="#22D3B7"/><text x="18" y="14" font-size="11" fill="#B6BDCC" font-weight="500">交付</text></g>
    </g>
  </g>

  <!-- Trust footer -->
  <g transform="translate(72 1124)" font-family="Inter, sans-serif" fill="#5A667F">
    <text font-size="10" letter-spacing="2.4" font-weight="700">SOC 2 &#183; SSO &#183; 区域化渲染</text>
  </g>
</svg>
