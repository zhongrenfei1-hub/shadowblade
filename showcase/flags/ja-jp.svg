<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 26" width="36" height="26" role="img" aria-label="Japanese (ja-jp) language pill">
  <defs>
    <radialGradient id="sb-flag-ja-dot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2EE2C4"/>
      <stop offset="100%" stop-color="#14B59A"/>
    </radialGradient>
    <filter id="sb-flag-ja-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="0.6" stdDeviation="0.5" flood-color="#06101F" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g filter="url(#sb-flag-ja-shadow)">
    <rect width="36" height="26" rx="4" fill="#FFFFFF"/>
    <rect width="36" height="26" rx="4" fill="none" stroke="rgba(15,29,58,0.18)" stroke-width="0.5"/>
  </g>

  <!-- Single accent dot (cyan-green) — top-right, off-axis from the locale code -->
  <circle cx="29" cy="7" r="3.2" fill="url(#sb-flag-ja-dot)"/>

  <text x="18" y="17" font-family="Inter Display, Inter, sans-serif" font-size="10" font-weight="700"
        fill="#0F1D3A" fill-opacity="0.95" text-anchor="middle" letter-spacing="0.4">JA</text>
</svg>
