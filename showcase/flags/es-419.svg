<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 26" width="36" height="26" role="img" aria-label="Spanish — Latin America (es-419) language pill">
  <defs>
    <linearGradient id="sb-flag-es-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="sb-flag-es-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.32)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sb-flag-es-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="0.6" stdDeviation="0.5" flood-color="#06101F" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g filter="url(#sb-flag-es-shadow)">
    <rect width="36" height="26" rx="4" fill="url(#sb-flag-es-grad)"/>
    <rect width="36" height="14" rx="4" fill="url(#sb-flag-es-sheen)"/>
    <rect width="36" height="26" rx="4" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
  </g>

  <text x="18" y="17" font-family="Inter Display, Inter, sans-serif" font-size="10" font-weight="700"
        fill="#FFFFFF" fill-opacity="0.95" text-anchor="middle" letter-spacing="0.4">ES</text>
</svg>
