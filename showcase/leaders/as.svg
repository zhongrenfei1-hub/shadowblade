<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Leader portrait — AS, abstract silhouette glyph">
  <defs>
    <linearGradient id="sb-leader-as-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A4A"/>
      <stop offset="100%" stop-color="#060C1A"/>
    </linearGradient>
    <linearGradient id="sb-leader-as-figure" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2EE2C4"/>
      <stop offset="100%" stop-color="#14B59A"/>
    </linearGradient>
    <radialGradient id="sb-leader-as-glow" cx="0.32" cy="0.30" r="0.55">
      <stop offset="0%" stop-color="#22D3B7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22D3B7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="128" fill="url(#sb-leader-as-bg)"/>
  <rect width="256" height="256" rx="128" fill="url(#sb-leader-as-glow)"/>

  <!-- Faint orbit arc -->
  <circle cx="128" cy="128" r="108" fill="none" stroke="rgba(34,211,183,0.16)" stroke-width="1" stroke-dasharray="2 5"/>

  <!-- Abstract silhouette: head + shoulders -->
  <g fill="url(#sb-leader-as-figure)">
    <!-- Head -->
    <circle cx="128" cy="104" r="34"/>
    <!-- Shoulders -->
    <path d="M52 220 Q52 168 128 162 Q204 168 204 220 Z"/>
  </g>

  <!-- Highlight stripe across shoulders -->
  <path d="M64 200 Q128 184 192 200" stroke="rgba(247,249,252,0.22)" stroke-width="1.5" fill="none"/>

  <!-- Accent ring (top-left placement) -->
  <circle cx="78" cy="58" r="6" fill="#22D3B7"/>
  <circle cx="78" cy="58" r="11" fill="none" stroke="rgba(34,211,183,0.35)" stroke-width="1.2"/>

  <!-- Monogram overlay -->
  <g font-family="Inter Display, Inter, sans-serif" text-anchor="middle">
    <text x="128" y="118" font-size="36" font-weight="700" fill="#0F2A4A" letter-spacing="-1.2">AS</text>
  </g>
</svg>
